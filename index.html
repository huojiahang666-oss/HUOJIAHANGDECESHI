<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>聊天室</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
  }
  #chat-container {
    display: flex;
    flex: 1;
    overflow: hidden;
  }
  #user-list {
    width: 150px;
    background: #f1f1f1;
    border-right: 1px solid #ccc;
    padding: 5px;
    box-sizing: border-box;
    overflow-y: auto;
  }
  #messages-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }
  #messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
    box-sizing: border-box;
  }
  .message {
    margin-bottom: 10px;
    max-width: 80%;
    word-wrap: break-word;
  }
  .message .meta {
    font-size: 0.8em;
    color: #666;
  }
  .message.self {
    align-self: flex-end;
    background: #d1ffd6;
    padding: 5px 10px;
    border-radius: 10px 0 10px 10px;
  }
  .message.other {
    align-self: flex-start;
    background: #fff;
    padding: 5px 10px;
    border-radius: 0 10px 10px 10px;
    border: 1px solid #ccc;
  }
  #input-container {
    display: flex;
    padding: 5px;
    border-top: 1px solid #ccc;
    background: #fafafa;
  }
  #input-field {
    flex: 1;
    padding: 5px 10px;
    font-size: 1em;
  }
  #send-btn {
    padding: 5px 15px;
    margin-left: 5px;
    font-size: 1em;
  }

  /* 手机竖屏隐藏用户列表 */
  @media (max-width: 600px) {
    #user-list {
      display: none;
    }
  }
</style>
</head>
<body>

<div id="chat-container">
  <div id="user-list">
    <h4>在线用户</h4>
    <ul id="users"></ul>
  </div>
  <div id="messages-container">
    <div id="messages"></div>
    <div id="input-container">
      <input type="text" id="input-field" placeholder="输入消息...">
      <button id="send-btn">发送</button>
    </div>
  </div>
</div>

<script>
const WS_URL = "wss://ducally-chemiluminescent-zenaida.ngrok-free.dev";
let username = prompt("请输入用户名:", "匿名");
if(!username) username = "匿名";

const ws = new WebSocket(WS_URL);

const messagesDiv = document.getElementById("messages");
const usersUl = document.getElementById("users");
const inputField = document.getElementById("input-field");
const sendBtn = document.getElementById("send-btn");

function addMessage(sender, text, self=false) {
  const msgDiv = document.createElement("div");
  msgDiv.className = 'message ' + (self ? 'self' : 'other');
  const meta = document.createElement("div");
  meta.className = 'meta';
  meta.textContent = sender + ' ' + new Date().toLocaleTimeString();
  const content = document.createElement("div");
  content.textContent = text;
  msgDiv.appendChild(meta);
  msgDiv.appendChild(content);
  messagesDiv.appendChild(msgDiv);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function updateUsers(userList) {
  usersUl.innerHTML = '';
  userList.forEach(u => {
    const li = document.createElement('li');
    li.textContent = u;
    usersUl.appendChild(li);
  });
}

ws.onopen = () => {
  ws.send(JSON.stringify({type: "join", username}));
};

ws.onmessage = (event) => {
  const data = JSON.parse(event.data);
  if(data.type === "message") {
    addMessage(data.username, data.text, data.username === username);
  } else if(data.type === "users") {
    updateUsers(data.users);
  } else if(data.type === "system") {
    addMessage("系统", data.text, false);
  }
};

sendBtn.onclick = () => {
  const msg = inputField.value.trim();
  if(msg) {
    ws.send(JSON.stringify({type: "message", username, text: msg}));
    inputField.value = '';
  }
};

inputField.addEventListener("keypress", (e) => {
  if(e.key === "Enter") sendBtn.click();
});
</script>

</body>
</html>
