<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聊天室</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        height: 100vh;
        background-color: #f0f0f0;
    }

    #chat-window {
        flex: 1;
        width: 100%;
        max-width: 600px;
        margin: 0 auto;
        padding: 10px;
        overflow-y: auto;
        background-color: #ffffff;
        box-sizing: border-box;
        border-bottom: 1px solid #ccc;
    }

    .message {
        margin-bottom: 10px;
        word-break: break-word;
    }

    .self {
        color: blue;
    }

    .other {
        color: green;
    }

    #input-area {
        display: flex;
        width: 100%;
        max-width: 600px;
        margin: 0 auto;
        padding: 10px;
        box-sizing: border-box;
        background-color: #fff;
    }

    #message-input {
        flex: 1;
        padding: 10px;
        font-size: 16px;
        border: 1px solid #ccc;
        border-radius: 4px;
    }

    #send-btn {
        width: 80px;
        margin-left: 10px;
        font-size: 16px;
        border: none;
        background-color: #4CAF50;
        color: white;
        border-radius: 4px;
        cursor: pointer;
        touch-action: manipulation;
    }

    #send-btn:active {
        background-color: #45a049;
    }
</style>
</head>
<body>
<div id="chat-window"></div>
<div id="input-area">
    <input type="text" id="message-input" placeholder="输入消息...">
    <button id="send-btn">发送</button>
</div>

<script>
const NGROK_URL = "wss://ducally-chemiluminescent-zenaida.ngrok-free.dev"; // 改成你的 WebSocket 地址

let username = prompt("请输入用户名:");
if(!username) username = "匿名";

const chatWindow = document.getElementById("chat-window");
const messageInput = document.getElementById("message-input");
const sendBtn = document.getElementById("send-btn");

let socket;

function appendMessage(text, isSelf=false) {
    const msgDiv = document.createElement("div");
    msgDiv.className = "message " + (isSelf ? "self" : "other");
    msgDiv.textContent = text;
    chatWindow.appendChild(msgDiv);
    chatWindow.scrollTop = chatWindow.scrollHeight; // 自动滚动到底部
}

function connect() {
    socket = new WebSocket(NGROK_URL);

    socket.onopen = () => {
        appendMessage("已连接到服务器。", false);
    };

    socket.onmessage = (event) => {
        const msg = event.data;
        // 避免重复显示自己发送的消息
        if(!msg.startsWith(username + ":")) {
            appendMessage(msg, false);
        }
    };

    socket.onclose = () => {
        appendMessage("已断开连接，尝试重连...", false);
        setTimeout(connect, 3000);
    };

    socket.onerror = (err) => {
        console.error("WebSocket 错误", err);
    };
}

sendBtn.addEventListener("click", () => {
    const msg = messageInput.value.trim();
    if(msg && socket && socket.readyState === WebSocket.OPEN) {
        const fullMsg = `${username}: ${msg}`;
        socket.send(fullMsg);
        appendMessage(fullMsg, true);
        messageInput.value = "";
    }
});

messageInput.addEventListener("keypress", (e) => {
    if(e.key === "Enter") sendBtn.click();
});

connect();
</script>
</body>
</html>
