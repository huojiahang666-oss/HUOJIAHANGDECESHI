<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>聊天室（带记录）</title>
<style>
body { font-family: Arial; background: #f0f0f0; }
#chat { width: 500px; margin: 50px auto; background: #fff; padding: 20px; border-radius: 10px; }
#messages { height: 300px; border: 1px solid #ccc; overflow-y: scroll; margin-bottom: 10px; padding: 5px; }
#input { width: 75%; padding: 5px; }
button { padding: 6px 10px; }
.system { color: gray; font-style: italic; }
</style>
</head>
<body>

<div id="chat">
    <h2>聊天室 <span id="count">(0人)</span></h2>
    <div id="messages"></div>
    <input id="input" placeholder="输入消息">
    <button onclick="send()">发送</button>
</div>

<script>
const ws = new WebSocket("wss://ducally-chemiluminescent-zenaida.ngrok-free.dev");

let username = prompt("请输入用户名：") || "游客";

const messages = document.getElementById("messages");
const count = document.getElementById("count");

// 颜色
function getColor(name) {
    let hash = 0;
    for (let i = 0; i < name.length; i++) {
        hash += name.charCodeAt(i);
    }
    return "hsl(" + (hash % 360) + ",70%,50%)";
}

// 连接
ws.onopen = () => {
    ws.send(JSON.stringify({ username: username }));
};

// 收消息
ws.onmessage = (e) => {
    const data = JSON.parse(e.data);

    if (data.type === "history") {
        // ✅ 加载历史
        data.messages.forEach(msg => {
            appendChatMessage(msg.user, msg.message);
        });
    } 
    else if (data.type === "system") {
        appendSystemMessage(data.message);
        count.innerText = `(${data.count}人)`;
    } 
    else {
        appendChatMessage(data.user, data.message);
    }
};

// 发消息
function send() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text) return;

    ws.send(text);
    input.value = "";
}

// 回车发送
document.getElementById("input").addEventListener("keypress", e => {
    if (e.key === "Enter") send();
});

// 聊天消息
function appendChatMessage(user, msg) {
    const div = document.createElement("div");
    const time = new Date().toLocaleTimeString();

    div.innerHTML = `<span style="color:${getColor(user)}">${user}</span> [${time}]: ${msg}`;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

// 系统消息
function appendSystemMessage(msg) {
    const div = document.createElement("div");
    div.className = "system";
    div.innerText = msg;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}
</script>

</body>
</html>
