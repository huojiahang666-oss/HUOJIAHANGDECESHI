<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聊天室</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    display: flex;
    height: 100vh;
}

/* 左侧用户列表 */
#sidebar {
    width: 80px;
    background: #2c3e50;
    color: white;
    overflow-y: auto;
}

.user {
    padding: 10px;
    text-align: center;
    border-bottom: 1px solid #444;
}

.avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #aaa;
    margin: auto;
}

/* 右侧聊天 */
#main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

#topBar {
    height: 40px;
    background: #4caf50;
    color: white;
    display: flex;
    align-items: center;
    padding: 0 10px;
}

#chat {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
}

.message {
    margin: 10px 0;
    display: flex;
    flex-direction: column;
}

.left { align-items: flex-start; }
.right { align-items: flex-end; }

.bubble {
    padding: 10px;
    border-radius: 10px;
    max-width: 70%;
}

.left .bubble { background: #eee; }
.right .bubble { background: #4caf50; color: white; }

.system {
    text-align: center;
    color: gray;
}

/* 输入 */
#inputArea {
    height: 60px;
    display: flex;
    border-top: 1px solid #ccc;
}

#msg {
    flex: 1;
    border: none;
    padding: 10px;
}

button {
    width: 80px;
    background: #4caf50;
    color: white;
    border: none;
}
</style>
</head>

<body>

<div id="sidebar"></div>

<div id="main">
    <div id="topBar">聊天室</div>
    <div id="chat"></div>

    <div id="inputArea">
        <input id="msg">
        <button onclick="send()">发送</button>
    </div>
</div>

<script>
const username = prompt("用户名") || "匿名";
const ws = new WebSocket("wss://ducally-chemiluminescent-zenaida.ngrok-free.dev");

// 随机头像颜色
function getColor(name) {
    const colors = ["red","blue","green","orange","purple"];
    return colors[name.length % colors.length];
}

ws.onopen = () => {
    ws.send(JSON.stringify({user: username}));
};

ws.onmessage = (e) => {
    const data = JSON.parse(e.data);

    if (data.type === "users") {
        const sidebar = document.getElementById("sidebar");
        sidebar.innerHTML = "";

        data.users.forEach(u => {
            const div = document.createElement("div");
            div.className = "user";

            const avatar = document.createElement("div");
            avatar.className = "avatar";
            avatar.style.background = getColor(u);

            const name = document.createElement("div");
            name.innerText = u;

            div.appendChild(avatar);
            div.appendChild(name);
            sidebar.appendChild(div);
        });
    }

    if (data.type === "count") {
        document.getElementById("topBar").innerText = "在线人数: " + data.count;
    }

    if (data.type === "system") {
        addSystem(data.text);
    }

    if (data.type === "chat") {
        addMessage(data);
    }
};

function addSystem(text) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = "system";
    div.innerText = text;
    chat.appendChild(div);
}

function addMessage(data) {
    const chat = document.getElementById("chat");
    const isMe = data.user === username;

    const msg = document.createElement("div");
    msg.className = "message " + (isMe ? "right" : "left");

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerText = data.text;

    msg.appendChild(bubble);
    chat.appendChild(msg);

    chat.scrollTop = chat.scrollHeight;
}

function send() {
    const input = document.getElementById("msg");
    if (!input.value) return;

    ws.send(JSON.stringify({text: input.value}));
    input.value = "";
}
</script>

</body>
</html>
