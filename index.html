<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聊天室</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f5f5f5;
}

/* 聊天区 */
#chat {
    height: 90vh;
    overflow-y: auto;
    padding: 10px;
}

/* 气泡 */
.message {
    margin: 5px 0;
    display: flex;
}

.left {
    justify-content: flex-start;
}

.right {
    justify-content: flex-end;
}

.bubble {
    max-width: 70%;
    padding: 10px;
    border-radius: 10px;
}

.left .bubble {
    background: white;
}

.right .bubble {
    background: #4caf50;
    color: white;
}

/* 输入区 */
#inputArea {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
    background: white;
    border-top: 1px solid #ccc;
}

#msg {
    flex: 1;
    padding: 10px;
    border: none;
    outline: none;
}

button {
    padding: 10px 15px;
    border: none;
    background: #4caf50;
    color: white;
}
</style>
</head>

<body>

<div id="chat"></div>

<div id="inputArea">
    <input id="msg" placeholder="输入消息...">
    <button onclick="send()">发送</button>
</div>

<script>
const username = prompt("请输入用户名") || "匿名";

// ⚠️ 改成你的 ngrok 地址
const ws = new WebSocket("wss://ducally-chemiluminescent-zenaida.ngrok-free.dev");

ws.onmessage = (e) => {
    addMessage(e.data);
};

function addMessage(text) {
    const chat = document.getElementById("chat");

    const isMe = text.startsWith(username + ":");

    const msgDiv = document.createElement("div");
    msgDiv.className = "message " + (isMe ? "right" : "left");

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerText = text;

    msgDiv.appendChild(bubble);
    chat.appendChild(msgDiv);

    chat.scrollTop = chat.scrollHeight;
}

function send() {
    const input = document.getElementById("msg");
    const text = input.value.trim();
    if (!text) return;

    ws.send(username + ": " + text);
    input.value = "";
}

// 回车发送
document.getElementById("msg").addEventListener("keypress", function(e){
    if(e.key === "Enter") send();
});
</script>

</body>
</html>
