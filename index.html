<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>聊天室</title>
<style>
body { font-family: Arial; }
#chat { width: 500px; margin: auto; }
#messages { height: 300px; border: 1px solid #ccc; overflow-y: scroll; margin-bottom: 10px; }
</style>
</head>
<body>

<div id="chat">
<h2>聊天室</h2>
<div id="messages"></div>
<input id="input" placeholder="输入消息">
<button onclick="send()">发送</button>
</div>

<script>
const ws = new WebSocket("wss://ducally-chemiluminescent-zenaida.ngrok-free.dev");

let username = prompt("用户名：") || "游客";

ws.onmessage = (e) => {
    const div = document.createElement("div");
    div.innerText = e.data;
    document.getElementById("messages").appendChild(div);
};

function send() {
    const input = document.getElementById("input");
    ws.send(username + ": " + input.value);
    input.value = "";
}
</script>

</body>
</html>
