<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聊天室</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f5f5f5;
}

#topBar {
    height: 40px;
    background: #4caf50;
    color: white;
    display: flex;
    align-items: center;
    padding: 0 10px;
}

#chat {
    overflow-y: auto;
    padding: 10px;
}

/* 消息 */
.message {
    margin: 10px 0;
    display: flex;
    flex-direction: column;
}

.left { align-items: flex-start; }
.right { align-items: flex-end; }

/* 用户名 */
.username {
    font-size: 12px;
    color: gray;
}

/* 气泡 */
.bubble {
    max-width: 70%;
    padding: 10px;
    border-radius: 10px;
    margin-top: 2px;
}

.left .bubble {
    background: white;
}

.right .bubble {
    background: #4caf50;
    color: white;
}

/* 时间 */
.time {
    font-size: 10px;
    color: gray;
    margin-top: 2px;
}

/* 系统消息 */
.system {
    text-align: center;
    color: gray;
    font-size: 12px;
}

/* 输入区 */
#inputArea {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 60px;
    display: flex;
    background: white;
    border-top: 1px solid #ccc;
}

#msg {
    flex: 1;
    padding: 10px;
    border: none;
}

button {
    padding: 10px;
    background: #4caf50;
    color: white;
    border: none;
}
</style>
</head>

<body>

<div id="topBar">聊天室</div>
<div id="chat"></div>

<div id="inputArea">
    <input id="msg" placeholder="输入消息...">
    <button onclick="send()">发送</button>
</div>

<script>
const username = prompt("用户名") || "匿名";
const ws = new WebSocket("wss://ducally-chemiluminescent-zenaida.ngrok-free.dev");

// 动态高度（防遮挡）
function updateHeight() {
    const chat = document.getElementById("chat");
    const input = document.getElementById("inputArea").offsetHeight;
    const top = document.getElementById("topBar").offsetHeight;

    chat.style.height = (window.innerHeight - input - top) + "px";
}
window.addEventListener("resize", updateHeight);
setTimeout(updateHeight, 300);

// 连接
ws.onopen = () => {
    ws.send(JSON.stringify({
        user: username
    }));
};

ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    render(data);
};

// 渲染
function render(data) {
    const chat = document.getElementById("chat");

    if (data.type === "count") {
        document.getElementById("topBar").innerText = "在线人数: " + data.count;
        return;
    }

    if (data.type === "system") {
        const div = document.createElement("div");
        div.className = "system";
        div.innerText = data.text;
        chat.appendChild(div);
    }

    if (data.type === "chat") {
        const isMe = data.user === username;

        const msg = document.createElement("div");
        msg.className = "message " + (isMe ? "right" : "left");

        const name = document.createElement("div");
        name.className = "username";
        name.innerText = data.user;

        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.innerText = data.text;

        const time = document.createElement("div");
        time.className = "time";
        time.innerText = data.time;

        msg.appendChild(name);
        msg.appendChild(bubble);
        msg.appendChild(time);

        chat.appendChild(msg);
    }

    setTimeout(() => {
        chat.scrollTop = chat.scrollHeight;
    }, 50);
}

// 发送
function send() {
    const input = document.getElementById("msg");
    const text = input.value.trim();
    if (!text) return;

    ws.send(JSON.stringify({
        text: text
    }));

    input.value = "";
}

// 回车发送
document.getElementById("msg").addEventListener("keypress", e => {
    if (e.key === "Enter") send();
});
</script>

</body>
</html>
