<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>聊天室</title>
<style>
body { font-family: Arial; background: #f0f0f0; }
#chat { width: 500px; margin: 50px auto; background: #fff; padding: 20px; border-radius: 10px; }
#messages { height: 300px; border: 1px solid #ccc; overflow-y: scroll; margin-bottom: 10px; padding: 5px; }
#input { width: 75%; padding: 5px; }
button { padding: 6px 10px; }
</style>
</head>
<body>

<div id="chat">
    <h2>聊天室</h2>
    <div id="messages"></div>
    <input id="input" placeholder="输入消息">
    <button onclick="send()">发送</button>
</div>

<script>
const ws = new WebSocket("wss://ducally-chemiluminescent-zenaida.ngrok-free.dev");

let username = prompt("请输入用户名：") || "游客";

const messages = document.getElementById("messages");

// ✅ 只通过服务器显示（关键）
ws.onmessage = (e) => {
    appendMessage(e.data);
};

// ✅ 发送消息（不自己显示，避免重复）
function send() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (text === "") return;

    const msg = username + ": " + text;

    ws.send(msg); // 只发送

    input.value = "";
}

// 回车发送
document.getElementById("input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        send();
    }
});

// 显示消息
function appendMessage(msg) {
    const div = document.createElement("div");
    div.innerText = msg;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}
</script>

</body>
</html>
