<!DOCTYPE html> 
 <html lang="zh"> 
 <head> 
 <meta charset="UTF-8"> 
 <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"> 
 <title>聊天室</title> 
 
 <style> 
 body { 
     margin: 0; 
     font-family: Arial; 
     display: flex; 
     height: 100vh; 
 } 
 
 /* 主区域 */ 
 #main { 
     flex: 1; 
     display: flex; 
     flex-direction: column; 
 } 
 
 /* 顶部 */ 
 #topBar { 
     height: 40px; 
     background: #4caf50; 
     color: white; 
     display: flex; 
     align-items: center; 
     padding: 0 10px; 
     justify-content: space-between; 
 } 
 
 #topLeft { 
     display: flex; 
     align-items: center; 
     gap: 10px; 
     min-width: 0; 
 } 
 
 #roomTitle { 
     font-weight: 600; 
     white-space: nowrap; 
     overflow: hidden; 
     text-overflow: ellipsis; 
 } 
 
 #typing { 
     font-size: 12px; 
     opacity: 0.9; 
     white-space: nowrap; 
     overflow: hidden; 
     text-overflow: ellipsis; 
     max-width: 45vw; 
     cursor: pointer; 
 } 
 
 #topRight { 
     display: flex; 
     align-items: center; 
     gap: 6px; 
 } 
 
 #searchInput { 
     height: 26px; 
     border-radius: 6px; 
     border: none; 
     padding: 0 8px; 
     outline: none; 
     width: 120px; 
 } 
 
 .topBtn { 
     height: 26px; 
     border-radius: 6px; 
     border: 0; 
     padding: 0 10px; 
     background: rgba(255,255,255,0.25); 
     color: white; 
     width: auto; 
 } 
 
 .msgActionBtn { 
     width: auto; 
     height: 22px; 
     border-radius: 8px; 
     border: 0; 
     padding: 0 8px; 
     background: rgba(0,0,0,0.08); 
     color: #333; 
 } 
 
 #actionSheet { 
     position: fixed; 
     inset: 0; 
     display: none; 
     align-items: flex-end; 
     justify-content: center; 
     background: rgba(0,0,0,0.35); 
     z-index: 9999; 
 } 
 
 #actionSheetPanel { 
     width: 100%; 
     max-width: 520px; 
     background: white; 
     border-radius: 14px 14px 0 0; 
     padding: 10px; 
     padding-bottom: calc(10px + env(safe-area-inset-bottom)); 
 } 
 
 #actionSheetTitle { 
     font-size: 13px; 
     color: #333; 
     padding: 4px 2px 10px 2px; 
     overflow: hidden; 
     text-overflow: ellipsis; 
     white-space: nowrap; 
 } 
 
 .sheetRow { 
     display: flex; 
     gap: 8px; 
     flex-wrap: wrap; 
 } 
 
 .sheetBtn { 
     flex: 1; 
     min-width: 90px; 
     height: 38px; 
     border-radius: 10px; 
     border: 0; 
     background: #f2f2f2; 
     color: #222; 
 } 
 
 .sheetBtnDanger { 
     background: #ffebee; 
     color: #c62828; 
 } 
 
 /* 聊天区 */ 
 #chat { 
     overflow-y: auto; 
     padding: 10px; 
     box-sizing: border-box; 
 } 
 
 /* 消息 */ 
 .message { 
     display: flex; 
     flex-direction: column; 
     margin: 10px 0; 
 } 
 
 .left { align-items: flex-start; } 
 .right { align-items: flex-end; } 
 
 .username { 
     font-size: 12px; 
     color: gray; 
 } 
 
 .bubble { 
     padding: 10px; 
     border-radius: 10px; 
     max-width: 70%; 
     margin-top: 2px; 
     word-break: break-word; 
 } 
 
 .left .bubble { background: #eee; } 
 .right .bubble { background: #4caf50; color: white; } 
 .pm .bubble { background: #9c27b0; color: white; } 
 .me .bubble { background: #ddd; color: #222; } 
 .mention .bubble { box-shadow: 0 0 0 2px rgba(255, 152, 0, 0.55) inset; } 
 
 .replyPreview { 
     font-size: 12px; 
     opacity: 0.85; 
     padding: 6px 10px; 
     border-radius: 8px; 
     max-width: 70%; 
     margin-top: 2px; 
 } 
 
 .left .replyPreview { background: rgba(0,0,0,0.06); } 
 .right .replyPreview { background: rgba(255,255,255,0.18); color: white; } 
 .pm .replyPreview { background: rgba(255,255,255,0.18); color: white; } 
 .me .replyPreview { background: rgba(0,0,0,0.06); } 
 
 .reactions { 
     display: flex; 
     gap: 6px; 
     flex-wrap: wrap; 
     margin-top: 4px; 
     font-size: 12px; 
 } 
 
 .reaction { 
     background: rgba(0,0,0,0.06); 
     padding: 2px 8px; 
     border-radius: 999px; 
 } 
 
 .time { 
     font-size: 10px; 
     color: gray; 
 } 
 
 /* 系统 */ 
 .system { 
     text-align: center; 
     color: rgba(0,0,0,0.42); 
     font-size: 12px; 
 } 
 
 /* 输入区 */ 
 #inputArea { 
     position: fixed; 
     bottom: 0; 
     width: 100%; 
     height: 60px; 
     display: flex; 
     background: white; 
     border-top: 1px solid #ccc; 
     padding-bottom: env(safe-area-inset-bottom); 
 } 
 
 #extraBar { 
     position: fixed; 
     bottom: 60px; 
     width: 100%; 
     background: white; 
     border-top: 1px solid #eee; 
     display: none; 
     flex-direction: column; 
 } 
 
 #replyBar { 
     display: none; 
     align-items: center; 
     justify-content: space-between; 
     padding: 8px 10px; 
     gap: 10px; 
 } 
 
 #replyText { 
     font-size: 12px; 
     color: #333; 
     overflow: hidden; 
     text-overflow: ellipsis; 
     white-space: nowrap; 
 } 
 
 #cancelReply { 
     height: 26px; 
     width: auto; 
     border-radius: 6px; 
     background: #eee; 
     color: #333; 
 } 
 
 #emojiPanel { 
     display: none; 
     padding: 8px 10px; 
     gap: 8px; 
     flex-wrap: wrap; 
 } 
 
 .emojiBtn { 
     width: auto; 
     height: 30px; 
     border-radius: 8px; 
     background: #f2f2f2; 
     color: #222; 
     padding: 0 10px; 
 } 
 
 #msg { 
     flex: 1; 
     border: none; 
     padding: 10px; 
     font-size: 16px; 
 } 
 
 button { 
     width: 80px; 
     border: none; 
     background: #4caf50; 
     color: white; 
 } 
 </style> 
 </head> 
 
 <body> 
 
 <div id="main"> 
     <div id="topBar"> 
         <div id="topLeft"> 
             <div id="roomTitle">聊天室</div> 
             <div id="typing"></div> 
         </div> 
         <div id="topRight"> 
             <input id="searchInput" placeholder="搜索" style="display:none;"> 
             <button class="topBtn" id="searchToggle">搜索</button> 
             <button class="topBtn" id="exitRoom" style="display:none;">退出</button> 
         </div> 
     </div> 
     <div id="chat"></div> 
 
     <div id="extraBar"> 
         <div id="replyBar"> 
             <div id="replyText"></div> 
             <button id="cancelReply">取消</button> 
         </div> 
         <div id="emojiPanel"></div> 
     </div> 
 
     <div id="inputArea"> 
         <input id="msg" placeholder="输入消息..."> 
         <button id="emojiToggle" style="width:70px;background:#eee;color:#333;">表情</button> 
         <button onclick="send()">发送</button> 
     </div> 
 </div> 
 
 <script> 
 let username = localStorage.getItem("chat_username"); 
 if (!username) { 
     username = (prompt("用户名") || "匿名").trim() || "匿名"; 
     localStorage.setItem("chat_username", username); 
 } 
 
 const params = new URLSearchParams(location.search); 
 let displayRoom = (params.get("room") || localStorage.getItem("chat_room") || "").trim(); 
 if (!displayRoom) { 
     displayRoom = "lobby"; 
 } 
 localStorage.setItem("chat_room", displayRoom); 
 
 const lockRequested = ["1", "true", "yes"].includes((params.get("lock") || "").toLowerCase()); 
 let roomKey = ""; 
 if (lockRequested) { 
     localStorage.removeItem("chat_roomkey_" + displayRoom); 
     roomKey = (prompt("房间密码(必填)") || "").trim(); 
     if (!roomKey) { 
         location.search = "?room=lobby"; 
     } 
 } 
 
 let roomId = null; 
 let isLockedRoom = false; 
 const helpTextShort = "回车发送 | /pm 私聊 | /room 普通房 | /proom 密码房 | /roll /flip /me | /block"; 
 const helpTextFull = "功能用法：\\n回车发送（Shift+回车不发送）\\n/pm 用户名 内容（私聊）\\n/room 房间名（普通房）\\n/proom 房间名（密码房）\\n/roll 1d100（掷骰）\\n/flip（抛硬币）\\n/me 动作（动作消息）\\n/block 用户名（屏蔽）\\n/unblock 用户名（取消屏蔽）\\n右键/长按消息：回复、表态、撤回、屏蔽"; 
 
 const typingEl = document.getElementById("typing"); 
 typingEl.addEventListener("click", () => { 
     alert(helpTextFull); 
 }); 
 
 const blocked = new Set(JSON.parse(localStorage.getItem("chat_blocked") || "[]")); 
 function saveBlocked() { 
     localStorage.setItem("chat_blocked", JSON.stringify(Array.from(blocked))); 
 } 
 
 const actionSheet = document.createElement("div"); 
 actionSheet.id = "actionSheet"; 
 actionSheet.innerHTML = '<div id="actionSheetPanel"><div id="actionSheetTitle"></div><div class="sheetRow" id="actionSheetRow"></div></div>'; 
 document.body.appendChild(actionSheet); 
 actionSheet.addEventListener("click", (e) => { 
     if (e.target === actionSheet) { 
         actionSheet.style.display = "none"; 
     } 
 }); 
 
 function showActionSheet(mid) { 
     const d = messageData.get(mid); 
     if (!d) return; 
     const sender = d.type === "pm" ? d.from : d.user; 
     const isMe = sender === username; 
     const titleEl = document.getElementById("actionSheetTitle"); 
     const rowEl = document.getElementById("actionSheetRow"); 
     titleEl.innerText = (sender || "") + (d.type === "pm" ? " (私聊)" : ""); 
     rowEl.innerHTML = ""; 
 
     const addBtn = (label, onClick, danger) => { 
         const b = document.createElement("button"); 
         b.className = "sheetBtn" + (danger ? " sheetBtnDanger" : ""); 
         b.type = "button"; 
         b.innerText = label; 
         b.onclick = () => { 
             actionSheet.style.display = "none"; 
             onClick(); 
         }; 
         rowEl.appendChild(b); 
     }; 
 
     addBtn("回复", () => setReplyTarget(mid)); 
     addBtn("表态", () => { 
         if (!ws || ws.readyState !== WebSocket.OPEN) { 
             addSystem("未连接，稍后再试"); 
             return; 
         } 
         const emoji = (prompt("输入表情(如 👍 ❤️ 😂)") || "").trim(); 
         if (!emoji) return; 
         ws.send(JSON.stringify({type: "react", id: mid, emoji: emoji})); 
     }); 
 
     if (isMe && (d.type === "chat" || d.type === "me") && !d.recalled) { 
         addBtn("撤回", () => { 
             if (ws && ws.readyState === WebSocket.OPEN) { 
                 ws.send(JSON.stringify({type: "recall", id: mid})); 
             } 
         }, true); 
     } 
 
     if (sender && sender !== username) { 
         if (blocked.has(sender)) { 
             addBtn("取消屏蔽", () => { 
                 blocked.delete(sender); 
                 saveBlocked(); 
                 addSystem("已取消屏蔽: " + sender); 
             }); 
         } else { 
             addBtn("屏蔽此人", () => { 
                 blocked.add(sender); 
                 saveBlocked(); 
                 addSystem("已屏蔽: " + sender); 
             }, true); 
         } 
     } 
 
     addBtn("取消", () => {}, false); 
     actionSheet.style.display = "flex"; 
 } 
 
 const messageEls = new Map(); 
 const messageData = new Map(); 
 let replyToId = null; 
 
 const extraBar = document.getElementById("extraBar"); 
 const replyBar = document.getElementById("replyBar"); 
 const replyText = document.getElementById("replyText"); 
 const cancelReply = document.getElementById("cancelReply"); 
 const emojiPanel = document.getElementById("emojiPanel"); 
 const emojiToggle = document.getElementById("emojiToggle"); 
 
 function setExtraBarVisible() { 
     const visible = replyBar.style.display !== "none" || emojiPanel.style.display !== "none"; 
     extraBar.style.display = visible ? "flex" : "none"; 
     setTimeout(updateHeight, 0); 
 } 
 
 function setReplyTarget(mid) { 
     replyToId = mid; 
     const d = messageData.get(mid); 
     if (d) { 
         const sender = d.type === "pm" ? d.from : d.user; 
         const preview = (d.recalled ? "已撤回" : (d.text || "")).slice(0, 40); 
         replyText.innerText = "回复 " + sender + ": " + preview; 
         replyBar.style.display = "flex"; 
     } else { 
         replyText.innerText = "回复"; 
         replyBar.style.display = "flex"; 
     } 
     setExtraBarVisible(); 
 } 
 
 function clearReply() { 
     replyToId = null; 
     replyBar.style.display = "none"; 
     setExtraBarVisible(); 
 } 
 cancelReply.addEventListener("click", clearReply); 
 
 const emojiList = ["😀","😂","😍","😭","👍","❤️","🔥","🎉","😡","😮","🙏","🤝"]; 
 function buildEmojiPanel() { 
     emojiPanel.innerHTML = ""; 
     emojiPanel.style.display = "flex"; 
     for (const e of emojiList) { 
         const b = document.createElement("button"); 
         b.className = "emojiBtn"; 
         b.innerText = e; 
         b.onclick = () => { 
             const input = document.getElementById("msg"); 
             input.value = (input.value || "") + e; 
             input.focus(); 
         }; 
         emojiPanel.appendChild(b); 
     } 
     setExtraBarVisible(); 
 } 
 
 function toggleEmojiPanel() { 
     if (emojiPanel.style.display === "none" || emojiPanel.style.display === "") { 
         buildEmojiPanel(); 
     } else { 
         emojiPanel.style.display = "none"; 
         setExtraBarVisible(); 
     } 
 } 
 emojiToggle.addEventListener("click", toggleEmojiPanel); 
 
 const searchToggle = document.getElementById("searchToggle"); 
 const searchInput = document.getElementById("searchInput"); 
 
 function applySearchFilter() { 
     const q = (searchInput.value || "").trim().toLowerCase(); 
     for (const [mid, el] of messageEls.entries()) { 
         const d = messageData.get(mid); 
         if (!d) continue; 
         const t = (d.text || "").toLowerCase(); 
         const u = (d.user || d.from || "").toLowerCase(); 
         el.style.display = !q || t.includes(q) || u.includes(q) ? "" : "none"; 
     } 
 } 
 
 searchToggle.addEventListener("click", () => { 
     const show = searchInput.style.display === "none"; 
     searchInput.style.display = show ? "" : "none"; 
     if (!show) { 
         searchInput.value = ""; 
         applySearchFilter(); 
     } else { 
         searchInput.focus(); 
     } 
 }); 
 searchInput.addEventListener("input", applySearchFilter); 
 
 function hashColor(name) { 
     let h = 0; 
     for (let i = 0; i < name.length; i++) { 
         h = (h * 31 + name.charCodeAt(i)) >>> 0; 
     } 
     const colors = ["#f44336","#2196f3","#4caf50","#ff9800","#9c27b0","#00bcd4","#795548","#607d8b"]; 
     return colors[h % colors.length]; 
 } 
 
 function updateTopBar(countText, typingText) { 
     const title = "聊天室" + (isLockedRoom ? " 🔒" : "") + (countText ? (" · " + countText) : ""); 
     document.getElementById("roomTitle").innerText = title; 
     document.getElementById("typing").innerText = typingText || helpTextShort; 
     document.getElementById("exitRoom").style.display = isLockedRoom ? "" : "none"; 
 } 
 updateTopBar("", ""); 
 let lastCountText = ""; 
 
 const defaultTitle = document.title; 
 let unreadCount = 0; 
 let titleTimer = null; 
 let audioContext = null; 
 let audioEnabled = false; 
 
 function setTitleBadge() { 
     if (unreadCount > 0) { 
         document.title = "(" + unreadCount + ") " + defaultTitle; 
     } else { 
         document.title = defaultTitle; 
     } 
 } 
 
 function stopTitleBlink() { 
     if (titleTimer) { 
         clearInterval(titleTimer); 
         titleTimer = null; 
     } 
     setTitleBadge(); 
 } 
 
 function startTitleBlink() { 
     if (titleTimer) return; 
     let flip = false; 
     titleTimer = setInterval(() => { 
         flip = !flip; 
         document.title = flip ? ("(" + unreadCount + ") 新消息") : ("(" + unreadCount + ") " + defaultTitle); 
     }, 1000); 
 } 
 
 function enableAudio() { 
     if (audioEnabled) return; 
     try { 
         audioContext = new (window.AudioContext || window.webkitAudioContext)(); 
         audioEnabled = true; 
     } catch { 
         audioEnabled = false; 
     } 
 } 
 
 function beep() { 
     if (!audioEnabled || !audioContext) return; 
     if (audioContext.state === "suspended") { 
         audioContext.resume().catch(() => {}); 
     } 
     try { 
         const osc = audioContext.createOscillator(); 
         const gain = audioContext.createGain(); 
         osc.type = "sine"; 
         osc.frequency.value = 880; 
         gain.gain.value = 0.06; 
         osc.connect(gain); 
         gain.connect(audioContext.destination); 
         osc.start(); 
         osc.stop(audioContext.currentTime + 0.12); 
     } catch {} 
 } 
 
 function showNotification(title, body) { 
     if (!("Notification" in window)) return; 
     if (Notification.permission === "granted") { 
         try { 
             new Notification(title, { body }); 
         } catch {} 
         return; 
     } 
     if (Notification.permission === "default") { 
         Notification.requestPermission().catch(() => {}); 
     } 
 } 
 
 function notifyIncoming(sender, text, isPm, important) { 
     if (!document.hidden) { 
         if (important) beep(); 
         return; 
     } 
     unreadCount += 1; 
     setTitleBadge(); 
     startTitleBlink(); 
     beep(); 
     showNotification(isPm ? "私聊消息" : (important ? "提及你" : "新消息"), sender + ": " + text); 
 } 
 
 document.addEventListener("visibilitychange", () => { 
     if (!document.hidden) { 
         unreadCount = 0; 
         stopTitleBlink(); 
     } 
 }); 
 
 document.addEventListener("pointerdown", () => { 
     enableAudio(); 
     if ("Notification" in window && Notification.permission === "default") { 
         Notification.requestPermission().catch(() => {}); 
     } 
 }, { once: true }); 
 
 let typingUsers = new Set(); 
 function setTypingUser(user, isTyping) { 
     if (!user) return; 
     if (isTyping) typingUsers.add(user); 
     else typingUsers.delete(user); 
     const list = Array.from(typingUsers).slice(0, 2); 
     const text = list.length ? (list.join("、") + " 正在输入…") : ""; 
     updateTopBar(lastCountText, text); 
 } 
 
 let typingSent = false; 
 let typingTimer = null; 
 function sendTyping(isTyping) { 
     if (!ws || ws.readyState !== WebSocket.OPEN) return; 
     ws.send(JSON.stringify({type: "typing", isTyping: isTyping})); 
 } 
 
 const msgInput = document.getElementById("msg"); 
 let composing = false; 
 msgInput.addEventListener("compositionstart", () => { composing = true; }); 
 msgInput.addEventListener("compositionend", () => { composing = false; }); 
 msgInput.addEventListener("input", () => { 
     if (!typingSent) { 
         typingSent = true; 
         sendTyping(true); 
     } 
     if (typingTimer) clearTimeout(typingTimer); 
     typingTimer = setTimeout(() => { 
         typingSent = false; 
         sendTyping(false); 
     }, 900); 
 }); 
 msgInput.addEventListener("blur", () => { 
     if (typingTimer) clearTimeout(typingTimer); 
     if (typingSent) { 
         typingSent = false; 
         sendTyping(false); 
     } 
 }); 
 
 let ws; 
 let shouldReconnect = true; 
 function connect() { 
     ws = new WebSocket("wss://ducally-chemiluminescent-zenaida.ngrok-free.dev"); 
 
     ws.onopen = () => { 
         addSystem("已连接"); 
         ws.send(JSON.stringify({user: username, room: displayRoom, roomKey: roomKey || undefined})); 
     }; 
 
     ws.onmessage = (e) => { 
         const data = JSON.parse(e.data); 
 
         if (data.type === "roomInfo") { 
             roomId = data.room || roomId; 
             displayRoom = data.displayRoom || displayRoom; 
             isLockedRoom = !!data.locked; 
             updateTopBar(lastCountText, typingUsers.size ? (Array.from(typingUsers).slice(0,2).join("、") + " 正在输入…") : ""); 
             if (isLockedRoom) { 
                 addSystem("已进入密码房间"); 
             } 
             return; 
         } 
 
         if (roomId && data.room && data.room !== roomId) { 
             return; 
         } 
 
         if (data.type === "count") { 
             lastCountText = "在线人数: " + data.count; 
             updateTopBar(lastCountText, typingUsers.size ? (Array.from(typingUsers).slice(0,2).join("、") + " 正在输入…") : ""); 
         } 
 
         if (data.type === "system") { 
             addSystem(data.text); 
         } 
 
         if (data.type === "chat") { 
             addMessage(data); 
         } 
 
         if (data.type === "pm") { 
             addMessage(data); 
         } 
 
         if (data.type === "me") { 
             addMessage(data); 
         } 
 
         if (data.type === "typing") { 
             setTypingUser(data.user, data.isTyping); 
         } 
 
         if (data.type === "react") { 
             applyReaction(data); 
         } 
 
         if (data.type === "recall") { 
             applyRecall(data); 
         } 
     }; 
 
     ws.onerror = () => { 
         addSystem("连接失败"); 
     }; 
 
     ws.onclose = () => { 
         addSystem("连接断开，正在重连..."); 
         if (shouldReconnect) { 
             setTimeout(connect, 1000); 
         } 
     }; 
 } 
 connect(); 
 
 document.getElementById("exitRoom").addEventListener("click", () => { 
     shouldReconnect = false; 
     try { 
         if (ws) ws.close(); 
     } catch {} 
     roomKey = ""; 
     roomId = null; 
     isLockedRoom = false; 
     location.search = "?room=lobby"; 
 }); 
 
 /* ✅ 终极防遮挡 */ 
 function updateHeight() { 
     const chat = document.getElementById("chat"); 
     const inputH = document.getElementById("inputArea").offsetHeight; 
     const topH = document.getElementById("topBar").offsetHeight; 
     const extraH = extraBar.style.display === "none" ? 0 : extraBar.offsetHeight; 
 
     const viewH = window.visualViewport ? window.visualViewport.height : window.innerHeight; 
 
     chat.style.height = (viewH - inputH - topH - extraH) + "px"; 
 } 
 
 if (window.visualViewport) { 
     window.visualViewport.addEventListener("resize", updateHeight); 
 } 
 window.addEventListener("resize", updateHeight); 
 document.addEventListener("focusin", () => setTimeout(updateHeight, 300)); 
 
 setTimeout(updateHeight, 300); 
 
 /* 添加消息 */ 
 function addMessage(data) { 
     const chat = document.getElementById("chat"); 
     const isPm = data.type === "pm"; 
     const sender = isPm ? data.from : data.user; 
     const isMe = sender === username; 
 
     if (blocked.has(sender)) { 
         return; 
     } 
 
     const text = data.recalled ? "" : (data.text || ""); 
     const mentionMe = !isMe && (text.includes("@" + username) || text.includes("@all")); 
     if (!isMe) { 
         notifyIncoming(sender, text, isPm, mentionMe || isPm); 
     } 
 
     const msg = document.createElement("div"); 
     const isMeAction = data.type === "me"; 
     msg.className = "message " + (isMe ? "right" : "left") + (isPm ? " pm" : "") + (isMeAction ? " me" : "") + (mentionMe ? " mention" : ""); 
     const mid = data.id || (Date.now().toString(16) + Math.random().toString(16).slice(2)); 
     msg.dataset.id = mid; 
     messageEls.set(mid, msg); 
     messageData.set(mid, data); 
 
     const name = document.createElement("div"); 
     name.className = "username"; 
     if (isPm) { 
         name.innerText = isMe ? ("你 ➜ " + data.to + " (私聊)") : (data.from + " ➜ 你 (私聊)"); 
     } else if (isMeAction) { 
         name.innerText = data.user; 
     } else { 
         name.innerText = data.user; 
     } 
     name.style.color = hashColor(sender || ""); 
    name.style.display = "flex"; 
    name.style.alignItems = "center"; 
    name.style.justifyContent = "space-between"; 
    name.style.gap = "8px"; 
    const actionBtn = document.createElement("button"); 
    actionBtn.type = "button"; 
    actionBtn.className = "msgActionBtn"; 
    actionBtn.innerText = "⋯"; 
    actionBtn.addEventListener("click", (ev) => { 
        ev.stopPropagation(); 
        showActionSheet(mid); 
    }); 
    name.appendChild(actionBtn); 
 
     if (data.replyTo) { 
         const ref = messageData.get(data.replyTo); 
         const prev = document.createElement("div"); 
         prev.className = "replyPreview"; 
         if (ref) { 
             const refSender = ref.type === "pm" ? ref.from : ref.user; 
             const refText = ref.recalled ? "已撤回" : (ref.text || ""); 
             prev.innerText = "回复 " + refSender + ": " + refText.slice(0, 40); 
         } else { 
             prev.innerText = "回复"; 
         } 
         msg.appendChild(prev); 
     } 
 
     const bubble = document.createElement("div"); 
     bubble.className = "bubble"; 
     bubble.innerText = data.recalled ? "已撤回" : (data.type === "me" ? (sender + " " + text) : text); 
 
     const time = document.createElement("div"); 
     time.className = "time"; 
     time.innerText = data.time; 
 
     msg.appendChild(name); 
     msg.appendChild(bubble); 
     msg.appendChild(time); 
 
     const reactionsEl = document.createElement("div"); 
     reactionsEl.className = "reactions"; 
     msg.appendChild(reactionsEl); 
     renderReactions(mid); 
 
     msg.addEventListener("contextmenu", (ev) => { 
         ev.preventDefault(); 
        showActionSheet(mid); 
     }); 
 
     chat.appendChild(msg); 
     scrollBottom(); 
     applySearchFilter(); 
 } 
 
 function renderReactions(mid) { 
     const el = messageEls.get(mid); 
     const d = messageData.get(mid); 
     if (!el || !d) return; 
     const reactionsEl = el.querySelector(".reactions"); 
     if (!reactionsEl) return; 
     reactionsEl.innerHTML = ""; 
     const r = d.reactions; 
     if (!r || typeof r !== "object") return; 
     for (const [emoji, count] of Object.entries(r)) { 
         if (!count) continue; 
         const chip = document.createElement("div"); 
         chip.className = "reaction"; 
         chip.innerText = emoji + " " + count; 
         reactionsEl.appendChild(chip); 
     } 
 } 
 
 function applyReaction(data) { 
     const mid = data.id; 
     if (!mid) return; 
     const d = messageData.get(mid); 
     if (!d) return; 
     d.reactions = d.reactions || {}; 
     d.reactions[data.emoji] = data.count; 
     renderReactions(mid); 
 } 
 
 function applyRecall(data) { 
     const mid = data.id; 
     if (!mid) return; 
     const d = messageData.get(mid); 
     const el = messageEls.get(mid); 
     if (!d || !el) return; 
     d.recalled = true; 
     d.text = ""; 
     const bubble = el.querySelector(".bubble"); 
     if (bubble) bubble.innerText = "已撤回"; 
 } 
 
function openMessageActions(mid) { 
    showActionSheet(mid); 
} 
 
 /* 系统消息 */ 
 function addSystem(text) { 
     const chat = document.getElementById("chat"); 
     const div = document.createElement("div"); 
     div.className = "system"; 
     div.innerText = text; 
     chat.appendChild(div); 
 } 
 
 /* 发送 */ 
 function send() { 
     const input = document.getElementById("msg"); 
     const raw = (input.value || "").replace(/\u00A0/g, " ").replace(/[\u200B-\u200D\uFEFF]/g, ""); 
     const text = raw.trim(); 
     if (!text) { 
         input.value = ""; 
         return; 
     } 
     if (!ws || ws.readyState !== WebSocket.OPEN) { 
         addSystem("未连接，稍后再试"); 
         return; 
     } 
 
     if (text.startsWith("/block ")) { 
         const u = text.slice(7).trim(); 
         if (u) { 
             blocked.add(u); 
             saveBlocked(); 
             addSystem("已屏蔽: " + u); 
         } 
         input.value = ""; 
         return; 
     } 
 
     if (text.startsWith("/unblock ")) { 
         const u = text.slice(9).trim(); 
         if (u) { 
             blocked.delete(u); 
             saveBlocked(); 
             addSystem("已取消屏蔽: " + u); 
         } 
         input.value = ""; 
         return; 
     } 
 
     if (text.startsWith("/room ")) { 
         const r = text.slice(6).trim(); 
         if (r) { 
             localStorage.setItem("chat_room", r); 
             location.search = "?room=" + encodeURIComponent(r); 
         } 
         return; 
     } 
 
     if (text.startsWith("/proom ")) { 
         const r = text.slice(7).trim(); 
         if (r) { 
             localStorage.setItem("chat_room", r); 
             location.search = "?room=" + encodeURIComponent(r) + "&lock=1"; 
         } 
         return; 
     } 
 
     if (text === "/flip") { 
         ws.send(JSON.stringify({type: "command", cmd: "flip"})); 
         input.value = ""; 
         return; 
     } 
 
     if (text.startsWith("/roll")) { 
         const expr = text.slice(5).trim() || "1d6"; 
         ws.send(JSON.stringify({type: "command", cmd: "roll", expr: expr})); 
         input.value = ""; 
         return; 
     } 
 
     if (text.startsWith("/me ")) { 
         const t = text.slice(4).trim(); 
         if (t) { 
             ws.send(JSON.stringify({type: "command", cmd: "me", text: t})); 
         } 
         input.value = ""; 
         return; 
     } 
 
     if (text.startsWith("/pm ")) { 
         const rest = text.slice(4).trim(); 
         const spaceIndex = rest.indexOf(" "); 
         if (spaceIndex <= 0) { 
             addSystem("私聊用法: /pm 用户名 内容"); 
             return; 
         } 
         const to = rest.slice(0, spaceIndex).trim(); 
         const pmText = rest.slice(spaceIndex + 1).trim(); 
         if (!pmText) { 
             return; 
         } 
         ws.send(JSON.stringify({type: "pm", to: to, text: pmText})); 
         input.value = ""; 
         return; 
     } 
 
     ws.send(JSON.stringify({text: text, replyTo: replyToId || undefined})); 
     input.value = ""; 
     clearReply(); 
 } 
 
 /* 滚动 */ 
 function scrollBottom() { 
     const chat = document.getElementById("chat"); 
     setTimeout(() => { 
         chat.scrollTop = chat.scrollHeight; 
     }, 50); 
 } 
 
 /* 回车 */ 
 document.getElementById("msg").addEventListener("keydown", (e) => { 
     if (e.key !== "Enter") return; 
     if (e.shiftKey) return; 
     if (e.isComposing || composing) return; 
     if (e.repeat) return; 
     e.preventDefault(); 
     send(); 
 }); 
 </script>
