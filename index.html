<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>聊天室</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

/* 主区域 */
#main {
    flex: 1;
    display: flex;
    flex-direction: column;
}

/* 顶部 */
#topBar {
    height: 40px;
    background: #4caf50;
    color: white;
    display: flex;
    align-items: center;
    padding: 0 10px;
}

/* 聊天区 */
#chat {
    overflow-y: auto;
    padding: 10px;
    box-sizing: border-box;
    flex: 1;
}

/* 消息 */
.message {
    display: flex;
    flex-direction: column;
    margin: 10px 0;
}

.left { align-items: flex-start; }
.right { align-items: flex-end; }

.username {
    font-size: 12px;
    color: gray;
}

.bubble {
    padding: 10px;
    border-radius: 10px;
    max-width: 80%;
    margin-top: 2px;
    word-break: break-word;
}

.left .bubble { background: #eee; }
.right .bubble { background: #4caf50; color: white; }

.time {
    font-size: 10px;
    color: gray;
}

/* 系统 */
.system {
    text-align: center;
    color: gray;
    font-size: 12px;
}

/* 输入区 */
#inputArea {
    display: flex;
    width: 100%;
    height: 60px;
    background: white;
    border-top: 1px solid #ccc;
    padding-bottom: env(safe-area-inset-bottom);
}

#msg {
    flex: 1;
    border: none;
    padding: 10px;
    font-size: 16px;
}

button {
    width: 80px;
    border: none;
    background: #4caf50;
    color: white;
    font-size: 16px;
}
</style>
</head>

<body>

<div id="main">
    <div id="topBar">聊天室</div>
    <div id="chat"></div>

    <div id="inputArea">
        <input id="msg" placeholder="输入消息...">
        <button onclick="send()">发送</button>
    </div>
</div>

<script>
const username = prompt("请输入用户名") || "匿名";
const ws = new WebSocket("wss://ducally-chemiluminescent-zenaida.ngrok-free.dev");

// 调整聊天区高度防止输入框遮挡
function updateHeight() {
    const chat = document.getElementById("chat");
    const inputH = document.getElementById("inputArea").offsetHeight;
    const topH = document.getElementById("topBar").offsetHeight;
    const viewH = window.visualViewport ? window.visualViewport.height : window.innerHeight;
    chat.style.height = (viewH - topH - inputH) + "px";
}

if (window.visualViewport) {
    window.visualViewport.addEventListener("resize", updateHeight);
}
window.addEventListener("resize", updateHeight);
document.addEventListener("focusin", () => setTimeout(updateHeight, 300));
setTimeout(updateHeight, 300);

// WebSocket 连接
ws.onopen = () => {
    ws.send(JSON.stringify({type: "join", user: username}));
};

// 接收消息
ws.onmessage = (e) => {
    const data = JSON.parse(e.data);

    if(data.type === "chat") {
        addMessage(data.user, data.text, data.time, data.user === username);
    } else if(data.type === "system") {
        addSystem(data.text);
    } else if(data.type === "history") {
        data.messages.forEach(msg => addMessage(msg.user, msg.text, msg.time, msg.user === username));
    } else if(data.type === "count") {
        document.getElementById("topBar").innerText = "在线人数: " + data.count;
    }
};

// 添加消息
function addMessage(user, text, time, self=false) {
    const chat = document.getElementById("chat");
    const msg = document.createElement("div");
    msg.className = "message " + (self ? "right" : "left");

    const nameDiv = document.createElement("div");
    nameDiv.className = "username";
    nameDiv.innerText = user;

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerText = text;

    const timeDiv = document.createElement("div");
    timeDiv.className = "time";
    timeDiv.innerText = new Date(time).toLocaleTimeString();

    msg.appendChild(nameDiv);
    msg.appendChild(bubble);
    msg.appendChild(timeDiv);
    chat.appendChild(msg);
    scrollBottom();
}

// 系统消息
function addSystem(text) {
    const chat = document.getElementById("chat");
    const div = document.createElement("div");
    div.className = "system";
    div.innerText = text;
    chat.appendChild(div);
    scrollBottom();
}

// 发送消息
function send() {
    const input = document.getElementById("msg");
    const text = input.value.trim();
    if (!text) return;
    ws.send(JSON.stringify({type: "chat", user: username, text: text, time: Date.now()}));
    input.value = "";
}

// 滚动到底部
function scrollBottom() {
    const chat = document.getElementById("chat");
    setTimeout(() => { chat.scrollTop = chat.scrollHeight; }, 50);
}

// 回车发送
document.getElementById("msg").addEventListener("keypress", e=>{
    if(e.key==="Enter") send();
});
</script>

</body>
</html>
