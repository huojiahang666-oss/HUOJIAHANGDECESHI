<!DOCTYPE html> 
 <html lang="zh"> 
 <head> 
 <meta charset="UTF-8"> 
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"> 
 <title>聊天室</title> 
 
 <style> 
 :root {
     --bg: #0b1220;
     --surface: rgba(255, 255, 255, 0.92);
     --surface-2: rgba(255, 255, 255, 0.82);
     --text: #0f172a;
     --muted: rgba(15, 23, 42, 0.6);
     --border: rgba(15, 23, 42, 0.12);
     --shadow: 0 10px 30px rgba(2, 6, 23, 0.18);
     --shadow-soft: 0 6px 18px rgba(2, 6, 23, 0.12);
     --accent: #3b82f6;
     --accent-2: #22c55e;
     --pm: #8b5cf6;
 } 
 html, body { 
    height: 100%; 
    overflow: hidden; 
    overscroll-behavior: none; 
    background-color: #0b1220; /* 强制背景色，消除空白闪烁 */
} 
 
 body { 
     margin: 0; 
     font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif; 
     display: flex; 
     height: 100vh; 
     height: 100dvh; 
     width: 100vw;
     position: fixed; /* 锁定 body 及其子元素，防止页面滚动 */
     overflow: hidden;
     overscroll-behavior: none;
     background: radial-gradient(1200px 600px at 20% 0%, rgba(59, 130, 246, 0.25), transparent 55%), radial-gradient(900px 500px at 90% 10%, rgba(139, 92, 246, 0.18), transparent 55%), var(--bg); 
     color: var(--text); 
     -webkit-font-smoothing: antialiased; 
     -moz-osx-font-smoothing: grayscale; 
     -webkit-tap-highlight-color: transparent; 
     touch-action: manipulation; 
 } 
 
 /* 消息文本和输入框允许选中，其他禁止选中，避免手机误触 */
 * { -webkit-user-select: none; user-select: none; }
 input, textarea, .bubble, .username, .time, .system { -webkit-user-select: text; user-select: text; }
 
 /* 主区域 */ 
#main { 
    position: fixed; 
    bottom: 0; /* 改为底部固定 */
    left: 0; 
    right: 0; 
    display: flex; 
    flex-direction: column; 
    width: 100%; 
    max-width: 980px; 
    margin: 0 auto; 
    background: transparent; 
    height: 100vh; 
    height: 100dvh; 
    overflow: hidden; 
    will-change: height; 
} 

/* 顶部 */ 
#topBar { 
    height: 40px; 
    flex-shrink: 0; 
    background: rgba(15, 23, 42, 0.78); 
    color: rgba(255,255,255,0.92); 
    display: flex; 
    align-items: center; 
    padding: 0 10px; 
    justify-content: space-between; 
    backdrop-filter: blur(12px); 
    -webkit-backdrop-filter: blur(12px); 
    border-bottom: 1px solid rgba(255,255,255,0.10); 
    box-shadow: var(--shadow-soft); 
    border-radius: 0 0 14px 14px; 
} 
 
 #topLeft { 
     display: flex; 
     align-items: center; 
     gap: 10px; 
     min-width: 0; 
 } 
 
 #roomTitle { 
     font-weight: 600; 
     white-space: nowrap; 
     overflow: hidden; 
     text-overflow: ellipsis; 
     letter-spacing: 0.2px; 
 } 
 
 #typing { 
     font-size: 12px; 
     opacity: 0.85; 
     white-space: nowrap; 
     overflow: hidden; 
     text-overflow: ellipsis; 
     max-width: 45vw; 
     cursor: pointer; 
 } 
 
 #topRight { 
     display: flex; 
     align-items: center; 
     gap: 6px; 
 } 
 
 #searchInput { 
     height: 26px; 
     border-radius: 10px; 
     border: 1px solid rgba(255,255,255,0.18); 
     padding: 0 10px; 
     outline: none; 
     width: 120px; 
     background: rgba(255,255,255,0.12); 
     color: rgba(255,255,255,0.92); 
 } 
 
 #searchInput::placeholder { 
     color: rgba(255,255,255,0.62); 
 } 
 
 .topBtn { 
     height: 26px; 
     border-radius: 10px; 
     border: 0; 
     padding: 0 10px; 
     background: rgba(255,255,255,0.14); 
     color: rgba(255,255,255,0.92); 
     width: auto; 
     transition: background 120ms ease, transform 120ms ease; 
 } 
 
 .topBtn:active { 
     opacity: 0.8;
 } 
 
 .msgActionBtn { 
     width: auto; 
     height: 22px; 
     border-radius: 999px; 
     border: 1px solid rgba(15, 23, 42, 0.10); 
     padding: 0 10px; 
     background: rgba(255,255,255,0.8); 
     color: rgba(15, 23, 42, 0.8); 
     box-shadow: 0 2px 10px rgba(2, 6, 23, 0.10); 
 } 
 
 #actionSheet { 
     position: fixed; 
     inset: 0; 
     display: none; 
     align-items: flex-end; 
     justify-content: center; 
     background: rgba(2, 6, 23, 0.50); 
     z-index: 9999; 
     overscroll-behavior: contain;
 } 
 
 #actionSheetPanel { 
     width: 100%; 
     max-width: 520px; 
     background: rgba(255,255,255,0.96); 
     border-radius: 14px 14px 0 0; 
     padding: 10px; 
     padding-bottom: calc(10px + env(safe-area-inset-bottom)); 
     box-shadow: var(--shadow); 
 } 
 
 #actionSheetTitle { 
     font-size: 13px; 
     color: rgba(15, 23, 42, 0.86); 
     padding: 4px 2px 10px 2px; 
     overflow: hidden; 
     text-overflow: ellipsis; 
     white-space: nowrap; 
 } 
 
 .sheetRow { 
     display: flex; 
     gap: 8px; 
     flex-wrap: wrap; 
 } 
 
 .sheetBtn { 
     flex: 1; 
     min-width: 90px; 
     height: 38px; 
     border-radius: 10px; 
     border: 0; 
     background: #f2f2f2; 
     color: #222; 
 } 
 
 .sheetBtnDanger { 
     background: #ffebee; 
     color: #c62828; 
 } 
 
 /* 聊天区 */ 
#chat { 
    flex: 1; 
    overflow-y: auto; 
    overscroll-behavior-y: contain; 
    -webkit-overflow-scrolling: touch; /* 增强 iOS 滚动 */
    padding: 14px; 
    box-sizing: border-box; 
    margin: 12px 10px 12px 10px; 
    min-height: 100px; 
    background: var(--surface-2); 
    border: 1px solid var(--border); 
    border-radius: 18px; 
    box-shadow: var(--shadow-soft); 
    /* 避免点击时的布局抖动 */
    transform: translateZ(0);
    -webkit-user-drag: none;
} 
 
 /* 消息 */ 
 .message { 
     display: flex; 
     margin: 12px 0; 
 } 
 
 .left { flex-direction: row; align-items: flex-start; } 
 .right { flex-direction: row-reverse; align-items: flex-start; } 
 
 .msg_content {
     display: flex;
     flex-direction: column;
     max-width: 70%;
 }

 .left .msg_content { align-items: flex-start; }
 .right .msg_content { align-items: flex-end; }
 
 .username { 
     font-size: 12px; 
     color: var(--muted); 
 } 
 
 .avatar {
     width: 36px;
     height: 36px;
     border-radius: 50%;
     object-fit: cover;
     margin: 0 8px;
     background: #eee;
     flex-shrink: 0;
 }

 .bubble { 
    padding: 10px 12px; 
    border-radius: 14px; 
    max-width: 70%; 
    margin-top: 4px; 
    word-break: break-word; 
    border: 1px solid rgba(15, 23, 42, 0.08); 
    box-shadow: 0 8px 18px rgba(2, 6, 23, 0.08); 
} 

.bubble img { 
     max-width: 100%; 
     max-height: 300px; 
     border-radius: 8px; 
     display: block; 
     margin-top: 4px; 
     cursor: zoom-in; 
     object-fit: cover; 
 } 
 
 .left .bubble { background: rgba(255,255,255,0.96); color: rgba(15, 23, 42, 0.92); } 
 .right .bubble { background: linear-gradient(135deg, rgba(59,130,246,0.96), rgba(34,197,94,0.88)); color: rgba(255,255,255,0.96); border: 0; } 
 .pm .bubble { background: linear-gradient(135deg, rgba(139,92,246,0.96), rgba(59,130,246,0.88)); color: rgba(255,255,255,0.96); border: 0; } 
 .me .bubble { background: rgba(15, 23, 42, 0.06); color: rgba(15, 23, 42, 0.86); } 
 .mention .bubble { box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.55) inset, 0 10px 24px rgba(2,6,23,0.10); } 
 
 .replyPreview { 
     font-size: 12px; 
     opacity: 0.85; 
     padding: 8px 10px; 
     border-radius: 12px; 
     max-width: 70%; 
     margin-top: 4px; 
     border: 1px solid rgba(15, 23, 42, 0.08); 
 } 
 
 .left .replyPreview { background: rgba(15, 23, 42, 0.04); color: rgba(15, 23, 42, 0.78); } 
 .right .replyPreview { background: rgba(255,255,255,0.18); color: rgba(255,255,255,0.92); border-color: rgba(255,255,255,0.22); } 
 .pm .replyPreview { background: rgba(255,255,255,0.18); color: rgba(255,255,255,0.92); border-color: rgba(255,255,255,0.22); } 
 .me .replyPreview { background: rgba(15, 23, 42, 0.04); } 
 
 .reactions { 
     display: flex; 
     gap: 6px; 
     flex-wrap: wrap; 
     margin-top: 4px; 
     font-size: 12px; 
 } 
 
 .reaction { 
     background: rgba(15, 23, 42, 0.06); 
     padding: 3px 10px; 
     border-radius: 999px; 
 } 
 
 .time { 
     font-size: 10px; 
     color: rgba(15, 23, 42, 0.45); 
 } 
 
 /* 系统 */ 
.system { 
    text-align: center; 
    color: rgba(0,0,0,0.42); 
    font-size: 12px; 
    margin: 8px 0; 
} 

/* 加载更多 */ 
.loadMore { 
    text-align: center; 
    padding: 8px 0; 
    display: none; 
} 
.loadMoreBtn { 
    background: rgba(15, 23, 42, 0.06) !important; 
    color: var(--muted) !important; 
    font-size: 12px !important; 
    border-radius: 999px !important; 
    padding: 4px 16px !important; 
    width: auto !important; 
    font-weight: normal !important; 
    box-shadow: none !important; 
} 

/* 输入区 */ 
#inputArea { 
    flex-shrink: 0; 
    margin: 0 10px; 
    height: 60px; 
    display: flex; 
    background: rgba(255,255,255,0.92); 
    border: 1px solid var(--border); 
    box-shadow: var(--shadow); 
    border-radius: 16px 16px 0 0; 
    padding-bottom: env(safe-area-inset-bottom); 
} 

#extraBar { 
    flex-shrink: 0; 
    margin: 0 10px; 
    background: rgba(255,255,255,0.92); 
    border: 1px solid var(--border); 
    border-bottom: 0; 
    box-shadow: var(--shadow-soft); 
    border-radius: 16px 16px 0 0; 
    display: none; 
    flex-direction: column; 
} 
 
 #replyBar { 
     display: none; 
     align-items: center; 
     justify-content: space-between; 
     padding: 8px 10px; 
     gap: 10px; 
 } 
 
 #replyText { 
     font-size: 12px; 
     color: #333; 
     overflow: hidden; 
     text-overflow: ellipsis; 
     white-space: nowrap; 
 } 
 
 #cancelReply { 
     height: 26px; 
     width: auto; 
     border-radius: 6px; 
     background: #eee; 
     color: #333; 
 } 
 
 #emojiPanel { 
     display: none; 
     padding: 8px 10px; 
     gap: 8px; 
     flex-wrap: wrap; 
 } 
 
 .emojiBtn { 
     width: auto; 
     height: 30px; 
     border-radius: 8px; 
     background: #f2f2f2; 
     color: #222; 
     padding: 0 10px; 
 } 
 
 #msg { 
     flex: 1; 
     border: none; 
     padding: 10px; 
     font-size: 16px; 
     background: transparent; 
     color: rgba(15, 23, 42, 0.92); 
     outline: none; 
 } 
 
 #msg::placeholder { 
     color: rgba(15, 23, 42, 0.45); 
 } 
 
 button { 
     width: 80px; 
     border: none; 
     background: linear-gradient(135deg, var(--accent), var(--accent-2)); 
     color: rgba(255,255,255,0.96); 
     border-radius: 12px; 
     font-weight: 600; 
     letter-spacing: 0.2px; 
     transition: transform 120ms ease, filter 120ms ease; 
     filter: saturate(1.02); 
 } 
 
 button:active { 
     opacity: 0.8;
 } 
 </style> 
 </head>

 <script> 
 let username = ""; 
 
 const params = new URLSearchParams(location.search); 
 let displayRoom = (params.get("room") || localStorage.getItem("chat_room") || "").trim(); 
 if (!displayRoom) { 
     displayRoom = "lobby"; 
 } 
 localStorage.setItem("chat_room", displayRoom); 
 
 const lockRequested = ["1", "true", "yes"].includes((params.get("lock") || "").toLowerCase()); 
 let roomKey = ""; 
 if (lockRequested) { 
     localStorage.removeItem("chat_roomkey_" + displayRoom); 
     roomKey = (prompt("房间密码(必填)") || "").trim(); 
     if (!roomKey) { 
         location.search = "?room=lobby"; 
     } 
 } 
 
 let roomId = null; 
 let isLockedRoom = false; 
 let ownerName = ""; 
 let isOwner = false; 

 let isRegistering = false;
 const authModal = document.getElementById("authModal");
 const authTitle = document.getElementById("authTitle");
 const authBtn = document.getElementById("auth_btn");
 const authSwitchBtn = document.getElementById("auth_switch_btn");
 const authSwitchText = document.getElementById("auth_switch_text");
 const authUser = document.getElementById("auth_user");
 const authPass = document.getElementById("auth_pass");
 const authEmail = document.getElementById("auth_email");
 const authCode = document.getElementById("auth_code");
 const regEmailField = document.getElementById("reg_email_field");
 const regCodeField = document.getElementById("reg_code_field");
 const sendCodeBtn = document.getElementById("send_code_btn");

 authSwitchBtn.addEventListener("click", (e) => {
     e.preventDefault();
     isRegistering = !isRegistering;
     authTitle.innerText = isRegistering ? "注册账号" : "登录聊天室";
     authBtn.innerText = isRegistering ? "立即注册" : "登录";
     authSwitchText.innerText = isRegistering ? "已有账号？" : "没有账号？";
     authSwitchBtn.innerText = isRegistering ? "立即登录" : "立即注册";
     
     // 切换显示邮箱和验证码字段
     regEmailField.style.display = isRegistering ? "block" : "none";
     regCodeField.style.display = isRegistering ? "block" : "none";
 });

 sendCodeBtn.addEventListener("click", () => {
     const email = authEmail.value.trim();
     if (!email || !email.includes("@")) {
         alert("请输入正确的邮箱地址");
         return;
     }
     if (ws && ws.readyState === WebSocket.OPEN) {
         ws.send(JSON.stringify({
             type: "request_code",
             email: email
         }));
         
         // 按钮倒计时
         sendCodeBtn.disabled = true;
         let count = 60;
         const timer = setInterval(() => {
             sendCodeBtn.innerText = count + "s";
             if (count-- <= 0) {
                 clearInterval(timer);
                 sendCodeBtn.disabled = false;
                 sendCodeBtn.innerText = "发送验证码";
             }
         }, 1000);
     }
 });

 authBtn.addEventListener("click", () => {
     const user = authUser.value.trim();
     const pass = authPass.value.trim();
     const email = authEmail.value.trim();
     const code = authCode.value.trim();

     if (!user || !pass) {
         alert("请输入用户名和密码");
         return;
     }
     if (isRegistering && (!email || !code)) {
         alert("请输入邮箱和验证码");
         return;
     }

     if (ws && ws.readyState === WebSocket.OPEN) {
         const payload = {
             type: isRegistering ? "register" : "login",
             user: user,
             pass: pass
         };
         if (isRegistering) {
             payload.email = email;
             payload.code = code;
         }
         ws.send(JSON.stringify(payload));
     } else {
         alert("服务器未连接，请刷新重试");
     }
 });

  const helpTextFull = "🌟 聊天室功能全指引 🌟\n\n【基础操作】\n• 发送：回车键发送，Shift+回车换行\n• 图片：点击下方“图片”按钮发送压缩图\n• 缩放：点击聊天图片可查看大图\n• 改名：输入 /nick 新名字 (一周限3次)\n• 清屏：点击顶部“清屏”按钮清空本地记录\n• 历史：点击顶部“查看更多”加载旧消息\n\n【快捷指令】\n• /nick 新名字：修改你的用户名\n• /pm 用户名 内容：发起私聊\n• /room 房间名：进入普通房间\n• /proom 房间名：进入密码房间\n• /roll 1d100：掷骰子互动\n• /flip：抛硬币 (正面/反面)\n• /me 动作：发送动作消息\n• /block 用户名：本地屏蔽某人\n• /unblock 用户名：取消屏蔽\n\n【互动管理】\n• 消息操作：点击消息右侧“⋯”或长按/右键\n  (包含：回复、表态、撤回、屏蔽)\n• 房主特权 (仅限密码房)：\n  /kick 用户名：踢出房间 (1分钟禁入)\n  /mute 用户名：禁言\n  /unmute 用户名：解除禁言"; 
  
  const typingEl = document.getElementById("typing"); 
  document.getElementById("showHelp").addEventListener("click", () => { 
      alert(helpTextFull); 
  }); 
 
 const blocked = new Set(JSON.parse(localStorage.getItem("chat_blocked") || "[]")); 
 function saveBlocked() { 
     localStorage.setItem("chat_blocked", JSON.stringify(Array.from(blocked))); 
 } 
 
 const actionSheet = document.createElement("div"); 
 actionSheet.id = "actionSheet"; 
 actionSheet.innerHTML = '<div id="actionSheetPanel"><div id="actionSheetTitle"></div><div class="sheetRow" id="actionSheetRow"></div></div>'; 
 document.body.appendChild(actionSheet); 
 actionSheet.addEventListener("click", (e) => { 
     if (e.target === actionSheet) { 
         actionSheet.style.display = "none"; 
     } 
 }); 
 
 function showActionSheet(mid) { 
     const d = messageData.get(mid); 
     if (!d) return; 
     const sender = d.type === "pm" ? d.from : d.user; 
     const isMe = sender === username; 
     const titleEl = document.getElementById("actionSheetTitle"); 
     const rowEl = document.getElementById("actionSheetRow"); 
     titleEl.innerText = (sender || "") + (d.type === "pm" ? " (私聊)" : ""); 
     rowEl.innerHTML = ""; 
 
     const addBtn = (label, onClick, danger) => { 
         const b = document.createElement("button"); 
         b.className = "sheetBtn" + (danger ? " sheetBtnDanger" : ""); 
         b.type = "button"; 
         b.innerText = label; 
         b.onclick = () => { 
             actionSheet.style.display = "none"; 
             onClick(); 
         }; 
         rowEl.appendChild(b); 
     };

        const img = new Image();
        img.onload = () => {
            const canvas = document.createElement("canvas");
            let width = img.width;
            let height = img.height;
            
            // 设定最大尺寸限制
            const MAX_WIDTH = 1200;
            const MAX_HEIGHT = 1200;
            
            if (width > height) {
                if (width > MAX_WIDTH) {
                    height *= MAX_WIDTH / width;
                    width = MAX_WIDTH;
                }
            } else {
                if (height > MAX_HEIGHT) {
                    width *= MAX_HEIGHT / height;
                    height = MAX_HEIGHT;
                }
            }
            
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, width, height);
            
            // 导出压缩后的图片 (质量 0.7)
            const compressedBase64 = canvas.toDataURL("image/jpeg", 0.7);
            
            if (!ws || ws.readyState !== WebSocket.OPEN) {

     }

     if (!audioEnabled || !audioContext) return; 
     if (audioContext.state === "suspended") { 
         audioContext.resume().catch(() => {}); 
     } 
     try { 
         const osc = audioContext.createOscillator(); 
         const gain = audioContext.createGain(); 
         osc.type = "sine"; 
         osc.frequency.value = 880; 
         gain.gain.value = 0.06; 
         osc.connect(gain); 
         gain.connect(audioContext.destination); 
         osc.start(); 
         osc.stop(audioContext.currentTime + 0.12); 
     } catch {} 
 }

function changeUsername(newName) {

    let changes = JSON.parse(localStorage.getItem("chat_name_changes") || "[]");
    
    // 过滤掉一周以前的记录
    changes = changes.filter(t => now - t < oneWeek);
    
    if (changes.length >= 3) {
        const oldest = changes[0];
        const nextAvailable = new Date(oldest + oneWeek).toLocaleString();
        addSystem(`改名失败：一周内仅限修改3次。下一次可用时间：${nextAvailable}`);
        return;
    }
    
    const oldName = username;

    if (!cleanName || cleanName === oldName) return;
    
    username = cleanName;
    localStorage.setItem("chat_username", username);

    localStorage.setItem("chat_name_changes", JSON.stringify(changes));

    actionBtn.className = "msgActionBtn"; 
    actionBtn.innerText = "⋯"; 
    actionBtn.addEventListener("click", (ev) => { 
        ev.stopPropagation(); 
        showActionSheet(mid); 
    }); 
    name.appendChild(actionBtn); 

    if (data.replyTo) { 
        const ref = messageData.get(data.replyTo); 
        const prev = document.createElement("div"); 
        prev.className = "replyPreview"; 
        if (ref) { 
            const refSender = ref.type === "pm" ? ref.from : ref.user; 
            let refContent = ref.recalled ? "已撤回" : (ref.text || ""); 
            if (!ref.recalled && ref.type === "image") refContent = "[图片]"; 
            prev.innerText = "回复 " + refSender + ": " + refContent.slice(0, 40); 
        } else { 
            prev.innerText = "回复"; 
        } 
        content.appendChild(prev); 
    } 

    const bubble = document.createElement("div"); 
    bubble.className = "bubble"; 
    if (data.recalled) { 
        bubble.innerText = "已撤回"; 
    } else if (isImage) { 
        const img = document.createElement("img"); 
        img.src = data.image; 
        img.onclick = () => { 
            const overlay = document.createElement("div"); 
            overlay.style.position = "fixed"; 
            overlay.style.inset = "0"; 
            overlay.style.background = "rgba(0,0,0,0.9)"; 
            overlay.style.display = "flex"; 
            overlay.style.alignItems = "center"; 
            overlay.style.justifyContent = "center"; 
            overlay.style.zIndex = "10000"; 
            overlay.onclick = () => document.body.removeChild(overlay); 
            const fullImg = document.createElement("img"); 
            fullImg.src = data.image; 
            fullImg.style.maxWidth = "95vw"; 
            fullImg.style.maxHeight = "95vh"; 
            fullImg.style.objectFit = "contain"; 
            overlay.appendChild(fullImg); 
            document.body.appendChild(overlay); 
        }; 
        bubble.appendChild(img); 
    } else { 
        bubble.innerText = (data.type === "me" ? (sender + " " + text) : text); 
    } 

    const time = document.createElement("div"); 
    time.className = "time"; 
    time.innerText = data.time; 

    content.appendChild(name); 
    content.appendChild(bubble); 
    content.appendChild(time); 

    const reactionsEl = document.createElement("div"); 
    reactionsEl.className = "reactions"; 
    content.appendChild(reactionsEl); 

    msg.appendChild(content);
    renderReactions(mid); 

    msg.addEventListener("contextmenu", (ev) => { 
        ev.preventDefault(); 
        showActionSheet(mid); 
    }); 

    if (prepend) { 
        list.prepend(msg); 
    } else { 
        list.appendChild(msg); 
        scrollBottom(); 
    } 
    applySearchFilter(); 
} 

function loadMoreHistory() { 
    const firstMsg = document.querySelector("#messageList .message");
    if (!firstMsg) return;
    const firstId = firstMsg.dataset.id;
    
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
            type: "get_history",
            beforeId: firstId
        }));
    }
} 

function renderReactions(mid) { 
    const el = messageEls.get(mid); 
    const d = messageData.get(mid); 
    if (!el || !d) return; 
    const reactionsEl = el.querySelector(".reactions"); 
    if (!reactionsEl) return; 
    reactionsEl.innerHTML = ""; 
    const r = d.reactions; 
    if (!r || typeof r !== "object") return; 
    for (const [emoji, count] of Object.entries(r)) { 
        if (!count) continue; 
        const chip = document.createElement("div"); 
        chip.className = "reaction"; 
        chip.innerText = emoji + " " + count; 
        reactionsEl.appendChild(chip); 
    } 
} 

function applyReaction(data) { 
    const mid = data.id; 
    if (!mid) return; 
    const d = messageData.get(mid); 
    if (!d) return; 
    d.reactions = d.reactions || {}; 
    d.reactions[data.emoji] = data.count; 
    renderReactions(mid); 
} 

function applyRecall(data) { 
    const mid = data.id; 
    if (!mid) return; 
    const d = messageData.get(mid); 
    const el = messageEls.get(mid); 
    if (!d || !el) return; 
    d.recalled = true; 
    d.text = ""; 
    const bubble = el.querySelector(".bubble"); 
    if (bubble) bubble.innerText = "已撤回"; 
} 

function openMessageActions(mid) { 
    showActionSheet(mid); 
} 

/* 系统消息 */ 
function addSystem(text) { 
    const list = document.getElementById("messageList"); 
    const div = document.createElement("div"); 
    div.className = "system"; 
    div.innerText = text; 
    list.appendChild(div); 
} 
 
 /* 发送 */ 
 function send() { 
     const input = document.getElementById("msg"); 
     const raw = (input.value || "").replace(/\u00A0/g, " ").replace(/[\u200B-\u200D\uFEFF]/g, ""); 
     const text = raw.trim(); 
     if (!text) { 
         input.value = ""; 
         return; 
     } 
     if (!ws || ws.readyState !== WebSocket.OPEN) { 
         addSystem("未连接，稍后再试"); 
         return; 
     } 
 
     if (text.startsWith("/block ")) { 
         const u = text.slice(7).trim(); 
         if (u) { 
             blocked.add(u); 
             saveBlocked(); 
             addSystem("已屏蔽: " + u); 
         } 
         input.value = ""; 
         return; 
     } 
 
     if (text.startsWith("/unblock ")) { 
         const u = text.slice(9).trim(); 
         if (u) { 
             blocked.delete(u); 
             saveBlocked(); 
             addSystem("已取消屏蔽: " + u); 
         } 
         input.value = ""; 
         return; 
     } 
 
     if (text.startsWith("/room ")) { 
         const r = text.slice(6).trim(); 
         if (r) { 
             localStorage.setItem("chat_room", r); 
             location.search = "?room=" + encodeURIComponent(r); 
         } 
         return; 
     } 
 
     if (text.startsWith("/proom ")) { 
         const r = text.slice(7).trim(); 
         if (r) { 
             localStorage.setItem("chat_room", r); 
             location.search = "?room=" + encodeURIComponent(r) + "&lock=1"; 
         } 
         return; 
     } 
 
     if (text === "/flip") { 
         ws.send(JSON.stringify({type: "command", cmd: "flip"})); 
         input.value = ""; 
         return; 
     } 
 
     if (text.startsWith("/roll")) { 
         const expr = text.slice(5).trim() || "1d6"; 
         ws.send(JSON.stringify({type: "command", cmd: "roll", expr: expr})); 
         input.value = ""; 
         return; 
     } 
 
     if (text.startsWith("/me ")) { 
         const t = text.slice(4).trim(); 
         if (t) { 
             ws.send(JSON.stringify({type: "command", cmd: "me", text: t})); 
         } 
         input.value = ""; 
         return; 
     } 
 
     if (text.startsWith("/pm ")) { 
         const rest = text.slice(4).trim(); 
         const spaceIndex = rest.indexOf(" "); 
         if (spaceIndex <= 0) { 
             addSystem("私聊用法: /pm 用户名 内容"); 
             return; 
         } 
         const to = rest.slice(0, spaceIndex).trim(); 
         const pmText = rest.slice(spaceIndex + 1).trim(); 
         if (!pmText) { 
             return; 
         } 
         ws.send(JSON.stringify({type: "pm", to: to, text: pmText})); 
         input.value = ""; 
         return; 
     } 
 
     if (text.startsWith("/nick ")) { 
         const newName = text.slice(6).trim(); 
         if (!newName) { 
             addSystem("用法: /nick 新名字"); 
             input.value = ""; 
             return; 
         } 
         changeUsername(newName); 
         input.value = ""; 
         return; 
     } 
 
     ws.send(JSON.stringify({text: text, replyTo: replyToId || undefined})); 
     input.value = ""; 
     clearReply(); 
 } 
 
 // 彻底禁用多指缩放和手势缩放
 document.addEventListener('gesturestart', function(e) {
     e.preventDefault();
 });
 document.addEventListener('touchstart', function(event) {
     if (event.touches.length > 1) {
         event.preventDefault();
     }
 }, { passive: false });
 let lastTouchEnd = 0;
 document.addEventListener('touchend', function(event) {
     const now = (new Date()).getTime();
     if (now - lastTouchEnd <= 300) {
         event.preventDefault();
     }
     lastTouchEnd = now;
 }, false);

 /* 滚动 */ 
let scrollTimer = null;
function scrollBottom(force = false) { 
    const chat = document.getElementById("chat"); 
    if (scrollTimer && !force) return;
    
    scrollTimer = requestAnimationFrame(() => { 
        chat.scrollTo({ 
            top: chat.scrollHeight, 
            behavior: force ? "auto" : "smooth" 
        }); 
        scrollTimer = null;
    }); 
} 
 
 /* 回车 */ 
 document.getElementById("msg").addEventListener("keydown", (e) => { 
     if (e.key !== "Enter") return; 
     if (e.shiftKey) return; 
     if (e.isComposing || composing) return; 
     if (e.repeat) return; 
     e.preventDefault(); 
     send(); 
 }); 
 </script>
