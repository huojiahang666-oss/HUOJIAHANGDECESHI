<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>聊天室</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f5f5f5;
}

/* 顶部栏 */
#topBar {
    height: 40px;
    background: #4caf50;
    color: white;
    display: flex;
    align-items: center;
    padding: 0 10px;
}

/* 聊天区（高度用JS控制） */
#chat {
    overflow-y: auto;
    padding: 10px;
    box-sizing: border-box;
}

/* 消息 */
.message {
    margin: 5px 0;
    display: flex;
}

.left { justify-content: flex-start; }
.right { justify-content: flex-end; }

.system {
    text-align: center;
    color: gray;
    font-size: 12px;
}

.bubble {
    max-width: 70%;
    padding: 10px;
    border-radius: 10px;
    word-break: break-word;
}

.left .bubble { background: white; }
.right .bubble { background: #4caf50; color: white; }

/* 输入区 */
#inputArea {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 60px;
    display: flex;
    background: white;
    border-top: 1px solid #ccc;
}

#msg {
    flex: 1;
    padding: 10px;
    border: none;
    outline: none;
    font-size: 16px;
}

button {
    padding: 10px 15px;
    border: none;
    background: #4caf50;
    color: white;
}
</style>
</head>

<body>

<div id="topBar">聊天室</div>
<div id="chat"></div>

<div id="inputArea">
    <input id="msg" placeholder="输入消息...">
    <button onclick="send()">发送</button>
</div>

<script>
const username = prompt("请输入用户名") || "匿名";
const ws = new WebSocket("wss://ducally-chemiluminescent-zenaida.ngrok-free.dev");

// ✅ 关键：动态适配高度（解决键盘遮挡）
function setHeight() {
    const vh = window.innerHeight;
    document.getElementById("chat").style.height = (vh - 100) + "px";
}

window.addEventListener("resize", setHeight);
setHeight();

// 连接
ws.onopen = () => {
    ws.send(username);
};

ws.onmessage = (e) => {
    addMessage(e.data);
};

// 添加消息
function addMessage(text) {
    const chat = document.getElementById("chat");

    if (text.startsWith("👥")) {
        document.getElementById("topBar").innerText = text;
        return;
    }

    if (text.startsWith("🔔") || text.startsWith("❌")) {
        const div = document.createElement("div");
        div.className = "system";
        div.innerText = text;
        chat.appendChild(div);
    } else {
        const isMe = text.startsWith(username + ":");

        const msgDiv = document.createElement("div");
        msgDiv.className = "message " + (isMe ? "right" : "left");

        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.innerText = text;

        msgDiv.appendChild(bubble);
        chat.appendChild(msgDiv);
    }

    setTimeout(() => {
        chat.scrollTop = chat.scrollHeight;
    }, 50);
}

// 发送
function send() {
    const input = document.getElementById("msg");
    const text = input.value.trim();
    if (!text) return;

    ws.send(username + ": " + text);
    input.value = "";
}

// 回车发送
document.getElementById("msg").addEventListener("keypress", function(e){
    if(e.key === "Enter") send();
});

// ✅ 输入时自动滚到底（防遮挡）
document.getElementById("msg").addEventListener("focus", () => {
    setTimeout(() => {
        document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
    }, 300);
});
</script>

</body>
</html>
