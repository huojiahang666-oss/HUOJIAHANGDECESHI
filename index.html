<!DOCTYPE html> 
 <html lang="zh"> 
 <head> 
 <meta charset="UTF-8"> 
 <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"> 
 <title>聊天室</title> 
 
 <style> 
 body { 
     margin: 0; 
     font-family: Arial; 
     display: flex; 
     height: 100vh; 
 } 
 
 /* 主区域 */ 
 #main { 
     flex: 1; 
     display: flex; 
     flex-direction: column; 
 } 
 
 /* 顶部 */ 
 #topBar { 
     height: 40px; 
     background: #4caf50; 
     color: white; 
     display: flex; 
     align-items: center; 
     padding: 0 10px; 
 } 
 
 /* 聊天区 */ 
 #chat { 
     overflow-y: auto; 
     padding: 10px; 
     box-sizing: border-box; 
 } 
 
 /* 消息 */ 
 .message { 
     display: flex; 
     flex-direction: column; 
     margin: 10px 0; 
 } 
 
 .left { align-items: flex-start; } 
 .right { align-items: flex-end; } 
 
 .username { 
     font-size: 12px; 
     color: gray; 
 } 
 
 .bubble { 
     padding: 10px; 
     border-radius: 10px; 
     max-width: 70%; 
     margin-top: 2px; 
     word-break: break-word; 
 } 
 
 .left .bubble { background: #eee; } 
 .right .bubble { background: #4caf50; color: white; } 
 .pm .bubble { background: #9c27b0; color: white; } 
 
 .time { 
     font-size: 10px; 
     color: gray; 
 } 
 
 /* 系统 */ 
 .system { 
     text-align: center; 
     color: gray; 
 } 
 
 /* 输入区 */ 
 #inputArea { 
     position: fixed; 
     bottom: 0; 
     width: 100%; 
     height: 60px; 
     display: flex; 
     background: white; 
     border-top: 1px solid #ccc; 
     padding-bottom: env(safe-area-inset-bottom); 
 } 
 
 #msg { 
     flex: 1; 
     border: none; 
     padding: 10px; 
     font-size: 16px; 
 } 
 
 button { 
     width: 80px; 
     border: none; 
     background: #4caf50; 
     color: white; 
 } 
 </style> 
 </head> 
 
 <body> 
 
 <div id="main"> 
     <div id="topBar">聊天室</div> 
     <div id="chat"></div> 
 
     <div id="inputArea"> 
         <input id="msg" placeholder="输入消息..."> 
         <button onclick="send()">发送</button> 
     </div> 
 </div> 
 
 <script> 
 let username = localStorage.getItem("chat_username"); 
 if (!username) { 
     username = (prompt("用户名") || "匿名").trim() || "匿名"; 
     localStorage.setItem("chat_username", username); 
 } 
 
 const defaultTitle = document.title; 
 let unreadCount = 0; 
 let titleTimer = null; 
 let audioContext = null; 
 let audioEnabled = false; 
 
 function setTitleBadge() { 
     if (unreadCount > 0) { 
         document.title = "(" + unreadCount + ") " + defaultTitle; 
     } else { 
         document.title = defaultTitle; 
     } 
 } 
 
 function stopTitleBlink() { 
     if (titleTimer) { 
         clearInterval(titleTimer); 
         titleTimer = null; 
     } 
     setTitleBadge(); 
 } 
 
 function startTitleBlink() { 
     if (titleTimer) return; 
     let flip = false; 
     titleTimer = setInterval(() => { 
         flip = !flip; 
         document.title = flip ? ("(" + unreadCount + ") 新消息") : ("(" + unreadCount + ") " + defaultTitle); 
     }, 1000); 
 } 
 
 function enableAudio() { 
     if (audioEnabled) return; 
     try { 
         audioContext = new (window.AudioContext || window.webkitAudioContext)(); 
         audioEnabled = true; 
     } catch { 
         audioEnabled = false; 
     } 
 } 
 
 function beep() { 
     if (!audioEnabled || !audioContext) return; 
     if (audioContext.state === "suspended") { 
         audioContext.resume().catch(() => {}); 
     } 
     try { 
         const osc = audioContext.createOscillator(); 
         const gain = audioContext.createGain(); 
         osc.type = "sine"; 
         osc.frequency.value = 880; 
         gain.gain.value = 0.06; 
         osc.connect(gain); 
         gain.connect(audioContext.destination); 
         osc.start(); 
         osc.stop(audioContext.currentTime + 0.12); 
     } catch {} 
 } 
 
 function showNotification(title, body) { 
     if (!("Notification" in window)) return; 
     if (Notification.permission === "granted") { 
         try { 
             new Notification(title, { body }); 
         } catch {} 
         return; 
     } 
     if (Notification.permission === "default") { 
         Notification.requestPermission().catch(() => {}); 
     } 
 } 
 
 function notifyIncoming(sender, text, isPm) { 
     if (!document.hidden) return; 
     unreadCount += 1; 
     setTitleBadge(); 
     startTitleBlink(); 
     beep(); 
     showNotification(isPm ? "私聊消息" : "新消息", sender + ": " + text); 
 } 
 
 document.addEventListener("visibilitychange", () => { 
     if (!document.hidden) { 
         unreadCount = 0; 
         stopTitleBlink(); 
     } 
 }); 
 
 document.addEventListener("pointerdown", () => { 
     enableAudio(); 
     if ("Notification" in window && Notification.permission === "default") { 
         Notification.requestPermission().catch(() => {}); 
     } 
 }, { once: true }); 
 
 let ws; 
 function connect() { 
     ws = new WebSocket("wss://ducally-chemiluminescent-zenaida.ngrok-free.dev"); 
 
     ws.onopen = () => { 
         addSystem("已连接"); 
         ws.send(JSON.stringify({user: username})); 
     }; 
 
     ws.onmessage = (e) => { 
         const data = JSON.parse(e.data); 
 
         if (data.type === "count") { 
             document.getElementById("topBar").innerText = "在线人数: " + data.count; 
         } 
 
         if (data.type === "system") { 
             addSystem(data.text); 
         } 
 
         if (data.type === "chat") { 
             addMessage(data); 
         } 
 
         if (data.type === "pm") { 
             addMessage(data); 
         } 
     }; 
 
     ws.onerror = () => { 
         addSystem("连接失败"); 
     }; 
 
     ws.onclose = () => { 
         addSystem("连接断开，正在重连..."); 
         setTimeout(connect, 1000); 
     }; 
 } 
 connect(); 
 
 /* ✅ 终极防遮挡 */ 
 function updateHeight() { 
     const chat = document.getElementById("chat"); 
     const inputH = document.getElementById("inputArea").offsetHeight; 
     const topH = document.getElementById("topBar").offsetHeight; 
 
     const viewH = window.visualViewport ? window.visualViewport.height : window.innerHeight; 
 
     chat.style.height = (viewH - inputH - topH) + "px"; 
 } 
 
 if (window.visualViewport) { 
     window.visualViewport.addEventListener("resize", updateHeight); 
 } 
 window.addEventListener("resize", updateHeight); 
 document.addEventListener("focusin", () => setTimeout(updateHeight, 300)); 
 
 setTimeout(updateHeight, 300); 
 
 /* 添加消息 */ 
 function addMessage(data) { 
     const chat = document.getElementById("chat"); 
     const isPm = data.type === "pm"; 
     const sender = isPm ? data.from : data.user; 
     const isMe = sender === username; 
     if (!isMe) { 
         notifyIncoming(sender, data.text, isPm); 
     } 
 
     const msg = document.createElement("div"); 
     msg.className = "message " + (isMe ? "right" : "left") + (isPm ? " pm" : ""); 
 
     const name = document.createElement("div"); 
     name.className = "username"; 
     name.innerText = isPm ? (isMe ? ("你 ➜ " + data.to + " (私聊)") : (data.from + " ➜ 你 (私聊)")) : data.user; 
 
     const bubble = document.createElement("div"); 
     bubble.className = "bubble"; 
     bubble.innerText = data.text; 
 
     const time = document.createElement("div"); 
     time.className = "time"; 
     time.innerText = data.time; 
 
     msg.appendChild(name); 
     msg.appendChild(bubble); 
     msg.appendChild(time); 
 
     chat.appendChild(msg); 
     scrollBottom(); 
 } 
 
 /* 系统消息 */ 
 function addSystem(text) { 
     const chat = document.getElementById("chat"); 
     const div = document.createElement("div"); 
     div.className = "system"; 
     div.innerText = text; 
     chat.appendChild(div); 
 } 
 
 /* 发送 */ 
 function send() { 
     const input = document.getElementById("msg"); 
     const text = input.value.trim(); 
     if (!text) return; 
     if (!ws || ws.readyState !== WebSocket.OPEN) { 
         addSystem("未连接，稍后再试"); 
         return; 
     } 
 
     if (text.startsWith("/pm ")) { 
         const rest = text.slice(4).trim(); 
         const spaceIndex = rest.indexOf(" "); 
         if (spaceIndex <= 0) { 
             addSystem("私聊用法: /pm 用户名 内容"); 
             return; 
         } 
         const to = rest.slice(0, spaceIndex).trim(); 
         const pmText = rest.slice(spaceIndex + 1).trim(); 
         if (!pmText) { 
             return; 
         } 
         ws.send(JSON.stringify({type: "pm", to: to, text: pmText})); 
         input.value = ""; 
         return; 
     } 
 
     ws.send(JSON.stringify({text: text})); 
     input.value = ""; 
 } 
 
 /* 滚动 */ 
 function scrollBottom() { 
     const chat = document.getElementById("chat"); 
     setTimeout(() => { 
         chat.scrollTop = chat.scrollHeight; 
     }, 50); 
 } 
 
 /* 回车 */ 
 document.getElementById("msg").addEventListener("keypress", e=>{ 
     if(e.key==="Enter") send(); 
 }); 
 </script> 
 
 </body> 
 </html>
