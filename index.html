<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>聊天室</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f5f5f5;
}

/* 顶部 */
#topBar {
    height: 40px;
    background: #4caf50;
    color: white;
    display: flex;
    align-items: center;
    padding: 0 10px;
}

/* 聊天区 */
#chat {
    overflow-y: auto;
    padding: 10px;
    box-sizing: border-box;
}

/* 消息 */
.message {
    margin: 5px 0;
    display: flex;
}

.left { justify-content: flex-start; }
.right { justify-content: flex-end; }

.system {
    text-align: center;
    color: gray;
    font-size: 12px;
}

/* 气泡 */
.bubble {
    max-width: 70%;
    padding: 10px;
    border-radius: 10px;
    word-break: break-word;
}

.left .bubble { background: white; }
.right .bubble { background: #4caf50; color: white; }

/* 输入区 */
#inputArea {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: 60px;
    display: flex;
    background: white;
    border-top: 1px solid #ccc;
}

#msg {
    flex: 1;
    padding: 10px;
    border: none;
    outline: none;
    font-size: 16px;
}

button {
    padding: 10px 15px;
    border: none;
    background: #4caf50;
    color: white;
}
</style>
</head>

<body>

<div id="topBar">聊天室</div>
<div id="chat"></div>

<div id="inputArea">
    <input id="msg" placeholder="输入消息...">
    <button onclick="send()">发送</button>
</div>

<script>
const username = prompt("请输入用户名") || "匿名";
const ws = new WebSocket("wss://ducally-chemiluminescent-zenaida.ngrok-free.dev");

// ✅ 更可靠的高度适配（核心修复）
function updateHeight() {
    const chat = document.getElementById("chat");
    const inputHeight = document.getElementById("inputArea").offsetHeight;
    const topHeight = document.getElementById("topBar").offsetHeight;

    chat.style.height = (window.innerHeight - inputHeight - topHeight) + "px";
}

// 多重监听（适配所有手机）
window.addEventListener("resize", updateHeight);
window.addEventListener("orientationchange", updateHeight);
setTimeout(updateHeight, 300);

// 连接
ws.onopen = () => {
    ws.send(username);
};

ws.onmessage = (e) => {
    addMessage(e.data);
};

// ✅ 更严谨判断是不是自己
function isMyMessage(text) {
    return text.indexOf(username + ": ") === 0;
}

function addMessage(text) {
    const chat = document.getElementById("chat");

    // 在线人数
    if (text.startsWith("👥")) {
        document.getElementById("topBar").innerText = text;
        return;
    }

    // 系统消息
    if (text.startsWith("🔔") || text.startsWith("❌")) {
        const div = document.createElement("div");
        div.className = "system";
        div.innerText = text;
        chat.appendChild(div);
    } else {
        const isMe = isMyMessage(text);

        const msgDiv = document.createElement("div");
        msgDiv.className = "message " + (isMe ? "right" : "left");

        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.innerText = text;

        msgDiv.appendChild(bubble);
        chat.appendChild(msgDiv);
    }

    scrollToBottom();
}

// 自动滚动
function scrollToBottom() {
    const chat = document.getElementById("chat");
    setTimeout(() => {
        chat.scrollTop = chat.scrollHeight;
    }, 50);
}

// 发送
function send() {
    const input = document.getElementById("msg");
    const text = input.value.trim();
    if (!text) return;

    ws.send(username + ": " + text);
    input.value = "";

    scrollToBottom();
}

// 回车发送
document.getElementById("msg").addEventListener("keypress", function(e){
    if(e.key === "Enter") send();
});

// ✅ 输入时自动适配（关键）
document.getElementById("msg").addEventListener("focus", () => {
    setTimeout(() => {
        updateHeight();
        scrollToBottom();
    }, 300);
});
</script>

</body>
</html>
